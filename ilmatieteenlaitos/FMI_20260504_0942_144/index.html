<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Helsinki — Sää tänään vs. eilen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 8px;
        }

        header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #fca5a5;
        }

        .comparison-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .comparison-card h2 {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .value-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .value-row:last-child {
            margin-bottom: 0;
        }

        .day-label {
            font-size: 0.85rem;
            color: #64748b;
            width: 60px;
        }

        .value {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            flex: 1;
            text-align: center;
        }

        .diff-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            min-width: 90px;
            justify-content: center;
        }

        .diff-badge.warmer {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
        }

        .diff-badge.colder {
            background: rgba(59, 130, 246, 0.15);
            color: #93c5fd;
        }

        .diff-badge.same {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
        }

        .diff-badge.more {
            background: rgba(234, 179, 8, 0.15);
            color: #fde047;
        }

        .diff-badge.less {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
        }

        .summary-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(147, 51, 234, 0.1));
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
            text-align: center;
        }

        .summary-card .summary-text {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #e2e8f0;
        }

        .summary-card .summary-emoji {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .grid .comparison-card {
            margin-bottom: 0;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #64748b;
            font-size: 0.85rem;
        }

        .detail-value {
            color: #e2e8f0;
            font-weight: 500;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #475569;
            font-size: 0.8rem;
        }

        footer a {
            color: #60a5fa;
            text-decoration: none;
        }
        .top-nav-bar {
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            height: 36px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 16px;
            gap: 12px;
            z-index: 99999;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .top-nav-bar a {
            color: #e2e8f0;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .top-nav-bar a:hover { color: #fff; }
        .top-nav-lang {
            display: flex;
            gap: 2px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
        }
        .top-nav-lang button {
            padding: 3px 8px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .top-nav-lang button.active {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        body { padding-top: 36px !important; }
    </style>
</head>
<body>
    <div class="top-nav-bar">
        <a href="../FMI_20260504_1019_883/">🏠 Pääsivu</a>
        <div class="top-nav-lang">
            <button onclick="setAppLang('fi')" id="lang-fi" class="active">FI</button>
            <button onclick="setAppLang('en')" id="lang-en">EN</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1 data-i18n="title">📊 Helsinki — Sää tänään vs. eilen</h1>
            <p id="dateInfo"></p>
        </header>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p data-i18n="loading">Haetaan säätietoja Ilmatieteen laitokselta...</p>
            </div>
        </div>

        <footer>
            <span data-i18n="footer">Lähde: Ilmatieteen laitos — avoin data (CC 4.0)</span> | <a href="https://www.ilmatieteenlaitos.fi/" target="_blank" rel="noopener">ilmatieteenlaitos.fi</a>
        </footer>
    </div>

    <script>
        const translations = {
            fi: {
                title: '📊 Helsinki — Sää tänään vs. eilen',
                loading: 'Haetaan säätietoja Ilmatieteen laitokselta...',
                footer: 'Lähde: Ilmatieteen laitos — avoin data (CC 4.0)',
                comparison: 'Vertailu:',
                vs: 'vs.',
                temp_avg: 'Lämpötila (keskiarvo)',
                wind_avg: 'Tuuli (keskiarvo)',
                temp_range: 'Lämpötilaväli',
                rain_humidity: 'Sade & kosteus',
                yesterday: 'Eilen',
                today: 'Tänään',
                same: 'Sama',
                yesterday_min_max: 'Eilen min / max',
                today_min_max: 'Tänään min / max',
                rain_yesterday: 'Sade eilen',
                rain_today: 'Sade tänään',
                humidity_today: 'Kosteus tänään',
                observations: 'Havaintojen lukumäärä',
                obs_yesterday: 'Eilen (tuntihavainnot)',
                obs_today: 'Tänään (tuntihavainnot)',
                obs_note: 'Tänään-tiedot päivittyvät tunnin välein reaaliajassa',
                pcs: 'kpl',
                error_title: 'Virhe haettaessa säätietoja',
                error_retry: 'Yritä ladata sivu uudelleen. Jos ongelma jatkuu, FMI:n rajapinta voi olla tilapäisesti poissa käytöstä.',
                same_temp: 'Tänään on käytännössä yhtä lämmintä kuin eilen.',
                avg_temp_is: 'Keskilämpötila on noin',
                much_warmer: 'Tänään on selvästi lämpimämpää kuin eilen!',
                avg_temp: 'Keskilämpötila on',
                degrees_more: 'astetta enemmän.',
                slightly_warmer: 'Tänään on hieman lämpimämpää kuin eilen.',
                much_colder: 'Tänään on selvästi kylmempää kuin eilen!',
                degrees_less: 'astetta vähemmän.',
                slightly_colder: 'Tänään on hieman kylmempää kuin eilen.',
                wind_stronger: 'Tuuli on voimistunut.',
                wind_weaker: 'Tuuli on heikentynyt.',
                rain_today_no_yesterday: 'Tänään sataa, eilen ei satanut.',
                no_rain_today_rain_yesterday: 'Eilen satoi, mutta tänään on poutaa.'
            },
            en: {
                title: '📊 Helsinki — Weather today vs. yesterday',
                loading: 'Fetching weather data from FMI...',
                footer: 'Source: Finnish Meteorological Institute — open data (CC 4.0)',
                comparison: 'Comparison:',
                vs: 'vs.',
                temp_avg: 'Temperature (average)',
                wind_avg: 'Wind (average)',
                temp_range: 'Temperature range',
                rain_humidity: 'Rain & humidity',
                yesterday: 'Yesterday',
                today: 'Today',
                same: 'Same',
                yesterday_min_max: 'Yesterday min / max',
                today_min_max: 'Today min / max',
                rain_yesterday: 'Rain yesterday',
                rain_today: 'Rain today',
                humidity_today: 'Humidity today',
                observations: 'Number of observations',
                obs_yesterday: 'Yesterday (hourly obs.)',
                obs_today: 'Today (hourly obs.)',
                obs_note: 'Today data updates in real time every hour',
                pcs: 'pcs',
                error_title: 'Error fetching weather data',
                error_retry: 'Try reloading the page. If the problem persists, the FMI API may be temporarily unavailable.',
                same_temp: 'Today is practically the same temperature as yesterday.',
                avg_temp_is: 'Average temperature is about',
                much_warmer: 'Today is significantly warmer than yesterday!',
                avg_temp: 'Average temperature is',
                degrees_more: 'degrees more.',
                slightly_warmer: 'Today is slightly warmer than yesterday.',
                much_colder: 'Today is significantly colder than yesterday!',
                degrees_less: 'degrees less.',
                slightly_colder: 'Today is slightly colder than yesterday.',
                wind_stronger: 'Wind has strengthened.',
                wind_weaker: 'Wind has weakened.',
                rain_today_no_yesterday: 'It is raining today, no rain yesterday.',
                no_rain_today_rain_yesterday: 'It rained yesterday, but today is dry.'
            }
        };

        let currentLang = 'fi';

        function T(key) {
            return translations[currentLang][key] || key;
        }

        function setAppLang(lang) {
            currentLang = lang;
            document.getElementById('lang-fi').classList.toggle('active', lang === 'fi');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
            fetchWeatherData();
        }

        const FMI_BASE = 'https://opendata.fmi.fi/wfs';
        const HELSINKI_FMISID = '100971';

        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        function buildFmiUrl(startTime, endTime) {
            const params = new URLSearchParams({
                service: 'WFS',
                version: '2.0.0',
                request: 'getFeature',
                storedquery_id: 'fmi::observations::weather::hourly::simple',
                fmisid: HELSINKI_FMISID,
                starttime: startTime,
                endtime: endTime,
                parameters: 't2m,ws_10min,rh,r_1h'
            });
            return `${FMI_BASE}?${params.toString()}`;
        }

        function parseXml(xmlText) {
            const parser = new DOMParser();
            return parser.parseFromString(xmlText, 'text/xml');
        }

        function extractObservations(doc) {
            const members = doc.querySelectorAll('member');
            const observations = {};

            members.forEach(member => {
                const time = member.querySelector('Time')?.textContent;
                const param = member.querySelector('ParameterName')?.textContent;
                const value = member.querySelector('ParameterValue')?.textContent;

                if (time && param && value && value !== 'NaN') {
                    if (!observations[time]) observations[time] = {};
                    observations[time][param] = parseFloat(value);
                }
            });

            return observations;
        }

        function calculateDayStats(observations) {
            const temps = [];
            const winds = [];
            const humidities = [];
            let totalRain = 0;

            Object.values(observations).forEach(obs => {
                if (obs.t2m !== undefined) temps.push(obs.t2m);
                if (obs.ws_10min !== undefined) winds.push(obs.ws_10min);
                if (obs.rh !== undefined) humidities.push(obs.rh);
                if (obs.r_1h !== undefined && obs.r_1h >= 0) totalRain += obs.r_1h;
            });

            if (temps.length === 0) return null;

            return {
                tempAvg: temps.reduce((a, b) => a + b, 0) / temps.length,
                tempMax: Math.max(...temps),
                tempMin: Math.min(...temps),
                windAvg: winds.length > 0 ? winds.reduce((a, b) => a + b, 0) / winds.length : null,
                windMax: winds.length > 0 ? Math.max(...winds) : null,
                humidityAvg: humidities.length > 0 ? humidities.reduce((a, b) => a + b, 0) / humidities.length : null,
                rain: totalRain,
                count: temps.length
            };
        }

        function getDiffClass(diff, type) {
            if (type === 'temp') {
                if (Math.abs(diff) < 0.5) return 'same';
                return diff > 0 ? 'warmer' : 'colder';
            }
            if (type === 'wind' || type === 'rain') {
                if (Math.abs(diff) < 0.3) return 'same';
                return diff > 0 ? 'more' : 'less';
            }
            return 'same';
        }

        function getDiffText(diff, unit, type) {
            if (type === 'temp') {
                if (Math.abs(diff) < 0.5) return T('same');
                const arrow = diff > 0 ? '↑' : '↓';
                return `${arrow} ${Math.abs(diff).toFixed(1)}${unit}`;
            }
            if (Math.abs(diff) < 0.1) return T('same');
            const arrow = diff > 0 ? '↑' : '↓';
            return `${arrow} ${Math.abs(diff).toFixed(1)}${unit}`;
        }

        function getSummaryText(todayStats, yesterdayStats) {
            const tempDiff = todayStats.tempAvg - yesterdayStats.tempAvg;
            const windDiff = (todayStats.windAvg || 0) - (yesterdayStats.windAvg || 0);

            let emoji = '';
            let text = '';

            if (Math.abs(tempDiff) < 0.5) {
                emoji = '😐';
                text = `${T('same_temp')} ${T('avg_temp_is')} ${todayStats.tempAvg.toFixed(1)} °C.`;
            } else if (tempDiff > 3) {
                emoji = '🌡️';
                text = `${T('much_warmer')} ${T('avg_temp')} ${todayStats.tempAvg.toFixed(1)} °C, ${tempDiff.toFixed(1)} ${T('degrees_more')}`;
            } else if (tempDiff > 0) {
                emoji = '☀️';
                text = `${T('slightly_warmer')} ${T('avg_temp')} ${todayStats.tempAvg.toFixed(1)} °C (+${tempDiff.toFixed(1)} °C).`;
            } else if (tempDiff < -3) {
                emoji = '🥶';
                text = `${T('much_colder')} ${T('avg_temp')} ${todayStats.tempAvg.toFixed(1)} °C, ${Math.abs(tempDiff).toFixed(1)} ${T('degrees_less')}`;
            } else {
                emoji = '❄️';
                text = `${T('slightly_colder')} ${T('avg_temp')} ${todayStats.tempAvg.toFixed(1)} °C (${tempDiff.toFixed(1)} °C).`;
            }

            if (Math.abs(windDiff) > 2) {
                text += ' ' + (windDiff > 0 ? T('wind_stronger') : T('wind_weaker'));
            }

            if (todayStats.rain > 0.5 && yesterdayStats.rain < 0.1) {
                text += ' ' + T('rain_today_no_yesterday');
            } else if (todayStats.rain < 0.1 && yesterdayStats.rain > 0.5) {
                text += ' ' + T('no_rain_today_rain_yesterday');
            }

            return { emoji, text };
        }

        function render(todayStats, yesterdayStats, todayLabel, yesterdayLabel) {
            const tempDiff = todayStats.tempAvg - yesterdayStats.tempAvg;
            const windDiff = (todayStats.windAvg || 0) - (yesterdayStats.windAvg || 0);
            const rainDiff = todayStats.rain - yesterdayStats.rain;

            const summary = getSummaryText(todayStats, yesterdayStats);

            const html = `
                <div class="summary-card">
                    <div class="summary-emoji">${summary.emoji}</div>
                    <div class="summary-text">${summary.text}</div>
                </div>

                <div class="grid">
                    <div class="comparison-card">
                        <h2>${T('temp_avg')}</h2>
                        <div class="value-row">
                            <span class="day-label">${T('yesterday')}</span>
                            <span class="value">${yesterdayStats.tempAvg.toFixed(1)}°</span>
                        </div>
                        <div class="value-row">
                            <span class="day-label">${T('today')}</span>
                            <span class="value">${todayStats.tempAvg.toFixed(1)}°</span>
                        </div>
                        <div class="value-row" style="justify-content:center; margin-top: 8px;">
                            <span class="diff-badge ${getDiffClass(tempDiff, 'temp')}">
                                ${getDiffText(tempDiff, '°C', 'temp')}
                            </span>
                        </div>
                    </div>

                    <div class="comparison-card">
                        <h2>${T('wind_avg')}</h2>
                        <div class="value-row">
                            <span class="day-label">${T('yesterday')}</span>
                            <span class="value">${yesterdayStats.windAvg !== null ? yesterdayStats.windAvg.toFixed(1) : '-'} m/s</span>
                        </div>
                        <div class="value-row">
                            <span class="day-label">${T('today')}</span>
                            <span class="value">${todayStats.windAvg !== null ? todayStats.windAvg.toFixed(1) : '-'} m/s</span>
                        </div>
                        <div class="value-row" style="justify-content:center; margin-top: 8px;">
                            <span class="diff-badge ${getDiffClass(windDiff, 'wind')}">
                                ${getDiffText(windDiff, ' m/s', 'wind')}
                            </span>
                        </div>
                    </div>

                    <div class="comparison-card">
                        <h2>${T('temp_range')}</h2>
                        <div class="detail-row">
                            <span class="detail-label">${T('yesterday_min_max')}</span>
                            <span class="detail-value">${yesterdayStats.tempMin.toFixed(1)}° / ${yesterdayStats.tempMax.toFixed(1)}°</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">${T('today_min_max')}</span>
                            <span class="detail-value">${todayStats.tempMin.toFixed(1)}° / ${todayStats.tempMax.toFixed(1)}°</span>
                        </div>
                    </div>

                    <div class="comparison-card">
                        <h2>${T('rain_humidity')}</h2>
                        <div class="detail-row">
                            <span class="detail-label">${T('rain_yesterday')}</span>
                            <span class="detail-value">${yesterdayStats.rain.toFixed(1)} mm</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">${T('rain_today')}</span>
                            <span class="detail-value">${todayStats.rain.toFixed(1)} mm</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">${T('humidity_today')}</span>
                            <span class="detail-value">${todayStats.humidityAvg !== null ? todayStats.humidityAvg.toFixed(0) + ' %' : '-'}</span>
                        </div>
                    </div>
                </div>

                <div class="comparison-card" style="margin-top: 20px;">
                    <h2>${T('observations')}</h2>
                    <div class="detail-row">
                        <span class="detail-label">${T('obs_yesterday')}</span>
                        <span class="detail-value">${yesterdayStats.count} ${T('pcs')}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">${T('obs_today')}</span>
                        <span class="detail-value">${todayStats.count} ${T('pcs')}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label" style="font-style:italic; color: #475569;">
                            ${T('obs_note')}
                        </span>
                    </div>
                </div>
            `;

            document.getElementById('content').innerHTML = html;
        }

        async function fetchWeatherData() {
            const now = new Date();
            const today = new Date(now);
            today.setHours(0, 0, 0, 0);

            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            const todayStr = formatDate(today);
            const yesterdayStr = formatDate(yesterday);
            const nowStr = now.toISOString();

            const locale = currentLang === 'fi' ? 'fi-FI' : 'en-GB';
            document.getElementById('dateInfo').textContent =
                `${T('comparison')} ${yesterday.toLocaleDateString(locale, { weekday: 'long', day: 'numeric', month: 'long' })} ${T('vs')} ${today.toLocaleDateString(locale, { weekday: 'long', day: 'numeric', month: 'long' })}`;

            try {
                const yesterdayUrl = buildFmiUrl(
                    `${yesterdayStr}T00:00:00Z`,
                    `${yesterdayStr}T23:59:59Z`
                );
                const todayUrl = buildFmiUrl(
                    `${todayStr}T00:00:00Z`,
                    nowStr
                );

                const [yesterdayResp, todayResp] = await Promise.all([
                    fetch(yesterdayUrl),
                    fetch(todayUrl)
                ]);

                if (!yesterdayResp.ok || !todayResp.ok) {
                    throw new Error('FMI-rajapinta ei vastannut odotetulla tavalla');
                }

                const yesterdayXml = await yesterdayResp.text();
                const todayXml = await todayResp.text();

                const yesterdayDoc = parseXml(yesterdayXml);
                const todayDoc = parseXml(todayXml);

                const yesterdayObs = extractObservations(yesterdayDoc);
                const todayObs = extractObservations(todayDoc);

                const yesterdayStats = calculateDayStats(yesterdayObs);
                const todayStats = calculateDayStats(todayObs);

                if (!yesterdayStats || !todayStats) {
                    throw new Error('Havaintodataa ei saatu riittävästi');
                }

                const todayLabel = today.toLocaleDateString('fi-FI', { weekday: 'short', day: 'numeric', month: 'numeric' });
                const yesterdayLabel = yesterday.toLocaleDateString('fi-FI', { weekday: 'short', day: 'numeric', month: 'numeric' });

                render(todayStats, yesterdayStats, todayLabel, yesterdayLabel);

            } catch (err) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <p><strong>${T('error_title')}</strong></p>
                        <p>${err.message}</p>
                        <p style="margin-top: 12px; font-size: 0.85rem; color: #94a3b8;">
                            ${T('error_retry')}
                        </p>
                    </div>
                `;
            }
        }

        fetchWeatherData();
    </script>
