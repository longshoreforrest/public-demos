<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilmatieteen laitoksen sovelluskokoelma</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --blue-900: #0c2340;
            --blue-700: #14406e;
            --blue-500: #1a5da6;
            --blue-300: #5a9fd4;
            --blue-100: #dbeaf7;
            --blue-50: #f0f6fc;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-400: #9ca3af;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --white: #ffffff;
            --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
            --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
            --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
            --radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--blue-50);
            color: var(--gray-800);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--blue-900) 0%, var(--blue-700) 100%);
            color: var(--white);
            padding: 2.5rem 1.5rem 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: .4rem;
        }

        header p {
            font-size: 1rem;
            opacity: .85;
            max-width: 600px;
            margin: 0 auto;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.2rem;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .05em;
            opacity: .7;
        }

        .controls {
            max-width: 1100px;
            margin: -1.5rem auto 0;
            padding: 0 1rem;
            position: relative;
            z-index: 10;
        }

        .search-box {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: .75rem;
        }

        .search-box svg {
            flex-shrink: 0;
            color: var(--gray-400);
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1rem;
            color: var(--gray-800);
            background: transparent;
        }

        .search-box input::placeholder { color: var(--gray-400); }

        .search-count {
            font-size: .85rem;
            color: var(--gray-400);
            white-space: nowrap;
        }

        .filters {
            max-width: 1100px;
            margin: 1rem auto .5rem;
            padding: 0 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: .5rem;
        }

        .filter-btn {
            padding: .45rem 1rem;
            border-radius: 999px;
            border: 1.5px solid var(--gray-200);
            background: var(--white);
            color: var(--gray-600);
            font-size: .85rem;
            cursor: pointer;
            transition: all .15s ease;
            display: flex;
            align-items: center;
            gap: .35rem;
        }

        .filter-btn:hover {
            border-color: var(--blue-300);
            color: var(--blue-500);
        }

        .filter-btn.active {
            background: var(--blue-500);
            border-color: var(--blue-500);
            color: var(--white);
        }

        .filter-btn .count {
            font-size: .75rem;
            opacity: .7;
        }

        main {
            max-width: 1100px;
            margin: 1rem auto 3rem;
            padding: 0 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        .card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform .15s ease, box-shadow .15s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .card-body {
            padding: 1.25rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-icon {
            font-size: 1.8rem;
            margin-bottom: .5rem;
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: .4rem;
            line-height: 1.35;
        }

        .card-desc {
            font-size: .88rem;
            color: var(--gray-600);
            flex: 1;
            margin-bottom: .75rem;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: .35rem;
            margin-bottom: .75rem;
        }

        .tag {
            font-size: .72rem;
            padding: .2rem .55rem;
            border-radius: 999px;
            font-weight: 500;
        }

        .tag-saa { background: #dbeafe; color: #1e40af; }
        .tag-ulkoilu { background: #dcfce7; color: #166534; }
        .tag-tyo { background: #fef3c7; color: #92400e; }
        .tag-koti { background: #fce7f3; color: #9d174d; }
        .tag-oppiminen { background: #ede9fe; color: #5b21b6; }
        .tag-data { background: #e0e7ff; color: #3730a3; }

        .card-link {
            display: inline-flex;
            align-items: center;
            gap: .35rem;
            color: var(--blue-500);
            text-decoration: none;
            font-size: .88rem;
            font-weight: 500;
        }

        .card-link:hover { text-decoration: underline; }

        .no-results {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--gray-400);
            grid-column: 1 / -1;
        }

        .no-results svg { margin-bottom: .75rem; }

        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--gray-400);
            font-size: .8rem;
            border-top: 1px solid var(--gray-200);
        }

        @media (max-width: 700px) {
            header h1 { font-size: 1.4rem; }
            .grid { grid-template-columns: 1fr; }
            .stats-bar { gap: 1.2rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Ilmatieteen laitoksen sovelluskokoelma</h1>
    <p>Avointa säädataa hyödyntäviä sovelluksia ja työkaluja — kaikki yhdessä paikassa</p>
    <div class="stats-bar">
        <div class="stat">
            <div class="stat-number" id="app-count">19</div>
            <div class="stat-label">Sovellusta</div>
        </div>
        <div class="stat">
            <div class="stat-number" id="cat-count">5</div>
            <div class="stat-label">Kategoriaa</div>
        </div>
    </div>
</header>

<div class="controls">
    <div class="search-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Hae sovelluksia nimellä tai kuvauksella…" autocomplete="off">
        <span class="search-count" id="search-count"></span>
    </div>
</div>

<div class="filters" id="filters"></div>

<main>
    <div class="grid" id="grid"></div>
</main>

<footer>
    Ilmatieteen laitoksen avointa dataa hyödyntävät demosovellukset &middot; 2026
</footer>

<script>

        icon: "🚴",

    {

        desc: "Yhdistää sähkön spot-hinnat ja sääennusteen — suosittelee optimaalisen saunomisajan Helsingissä.",
        icon: "🧖",
        categories: ["saa", "koti"]
    },
    {

        icon: "🛰️",
        categories: ["saa", "data"]
    },
    {

        title: "Tuulioptimoidut pyöräilyreitit",
        desc: "Laskee 20 km ympyräreitin Helsingissä siten, että vastatuuli minimoidaan FMI:n reaaliaikaisella tuulidatalla.",

    },
    {
        id: "FMI_20260504_1003_601",
        title: "Terassin öljyämisoptimoija",
        desc: "Löydä paras ajankohta terassin tai kuistin öljyämiseen FMI-sääennusteen perusteella — kuivat ja lämpimät jaksot.",

    },
    {

    {

        desc: "Suunnittele moottoripyöräilyn soratiereittejä Suomessa. Reittisuunnittelu, karttanäkymä ja sääolosuhteet.",

    {

    {

    {

        desc: "Lataa PowerPoint-esitys ja saa tekoälyanalyysi yleisön aktivoinnista ja osallistamisvinkeistä.",
        icon: "📽️",
        categories: ["tyo"]
    },
    {
        id: "FMI_20260504_1013_919",
        title: "LyhenneSanakirja — Organisaation termistö",
        desc: "Hallinnoi organisaation lyhenteitä ja termistöä. Hae, lisää ja jaa termejä tiimin kesken.",
        icon: "📖",
        categories: ["tyo"]
    },
    {
        id: "FMI_20260504_1016_557",
        title: "AI-agenttien tuotantoanalytiikka",
        desc: "Seuraa AI-agenttien suorituskykyä ja tuotantodataa reaaliajassa. Tilastot, trendit ja hälytysnäkymät.",
        icon: "🤖",
        categories: ["data", "tyo"]
    },
    {
        id: "FMI_20260504_0954_912",
        title: "Matemaattisten kaavojen todistaja",
        desc: "Opi todistamaan matemaattisia kaavoja askel askeleelta — interaktiivinen työkalu välikysymyksineen.",
        icon: "🧮",
        categories: ["oppiminen"]
    }
];

const categoryMeta = {
    saa:       { label: "Sää & Data",          color: "tag-saa" },
    ulkoilu:   { label: "Ulkoilu & Liikunta",  color: "tag-ulkoilu" },
    tyo:       { label: "Työ & Tuottavuus",    color: "tag-tyo" },
    koti:      { label: "Koti & Arki",          color: "tag-koti" },
    oppiminen: { label: "Oppiminen",            color: "tag-oppiminen" },
    data:      { label: "Reaaliaikadata",       color: "tag-data" }
};

let activeFilter = null;

function init() {
    renderFilters();
    renderGrid();
    document.getElementById("search").addEventListener("input", renderGrid);
    document.getElementById("app-count").textContent = apps.length;
    document.getElementById("cat-count").textContent = Object.keys(categoryMeta).length;
}

function renderFilters() {
    const counts = {};
    apps.forEach(a => a.categories.forEach(c => { counts[c] = (counts[c] || 0) + 1; }));

    const container = document.getElementById("filters");
    const allBtn = document.createElement("button");
    allBtn.className = "filter-btn active";
    allBtn.innerHTML = `Kaikki <span class="count">${apps.length}</span>`;
    allBtn.dataset.cat = "";
    allBtn.addEventListener("click", () => { activeFilter = null; updateFilterUI(); renderGrid(); });
    container.appendChild(allBtn);

    Object.entries(categoryMeta).forEach(([key, meta]) => {
        if (!counts[key]) return;
        const btn = document.createElement("button");
        btn.className = "filter-btn";
        btn.innerHTML = `${meta.label} <span class="count">${counts[key]}</span>`;
        btn.dataset.cat = key;
        btn.addEventListener("click", () => {
            activeFilter = activeFilter === key ? null : key;
            updateFilterUI();
            renderGrid();
        });
        container.appendChild(btn);
    });
}

function updateFilterUI() {
    document.querySelectorAll(".filter-btn").forEach(btn => {
        const cat = btn.dataset.cat;
        btn.classList.toggle("active", cat === "" ? !activeFilter : cat === activeFilter);
    });
}

function renderGrid() {
    const query = document.getElementById("search").value.toLowerCase().trim();
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const filtered = apps.filter(app => {
        if (activeFilter && !app.categories.includes(activeFilter)) return false;
        if (query) {
            const haystack = (app.title + " " + app.desc).toLowerCase();
            return query.split(/\s+/).every(word => haystack.includes(word));
        }
        return true;
    });

    document.getElementById("search-count").textContent =
        query || activeFilter ? `${filtered.length} / ${apps.length}` : "";

    if (filtered.length === 0) {
        grid.innerHTML = `
            <div class="no-results">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="8" x2="14" y2="14"/><line x1="14" y1="8" x2="8" y2="14"/></svg>
                <p>Ei sovelluksia näillä hakuehdoilla</p>
            </div>`;
        return;
    }

    filtered.forEach(app => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="card-body">
                <div class="card-icon">${app.icon}</div>
                <div class="card-title">${app.title}</div>
                <div class="card-desc">${app.desc}</div>
                <div class="card-tags">
                    ${app.categories.map(c => `<span class="tag ${categoryMeta[c].color}">${categoryMeta[c].label}</span>`).join("")}
                </div>
                <a class="card-link" href="../${app.id}/">
                    Avaa sovellus
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </a>
            </div>`;
        grid.appendChild(card);
    });
}

init();
</script>
</body>
</html>
