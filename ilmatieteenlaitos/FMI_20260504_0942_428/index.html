            color: #a0c4ff;
        }

            border-radius: 16px;
            padding: 24px;
            margin: 20px 0 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .goal-item {
            text-align: center;
        }

        .goal-item .label {
            font-size: 0.85rem;
            color: #7aa2f7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .goal-item .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .week-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 20px 0;
        }

        .week-selector button {
            background: rgba(0,212,255,0.15);
            border: 1px solid rgba(0,212,255,0.4);
            color: #00d4ff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .week-selector button:hover {
            background: rgba(0,212,255,0.3);
        }

        .week-selector button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .week-selector .week-label {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            min-width: 200px;
            text-align: center;
        }

        .phase-badge {

            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;

            padding: 16px 20px;
            margin-bottom: 20px;
            border-left: 3px solid #00d4ff;

            color: #00d4ff;
            margin-bottom: 6px;
        }

        .week-summary p {
            color: #b0b0b0;
            font-size: 0.95rem;
        }

            display: grid;
            gap: 12px;
        }

            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 18px 22px;

            align-items: center;
            gap: 16px;
            transition: all 0.2s;

            color: #fff;

            color: #00d4ff;
            font-size: 1.1rem;
        }

        .day-stats .pace {

            font-size: 1.8rem;
            font-weight: 700;
            color: #00d4ff;

            font-size: 0.85rem;
            color: #888;
            margin-top: 4px;
        }

            margin-top: 30px;
            text-align: center;

            color: #fff;
            margin-bottom: 12px;

            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            position: relative;
        }

            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);

        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.85rem;
            color: #888;

            }
            header h1 {

                    { day: "Sunnuntai", type: "Pitkä lenkki", details: "Rento pitkä lenkki", distance: 14, pace: "6:10–6:25" }
                ]
            },
            {
                week: 11,
                phase: "taper",
                phaseLabel: "Kevennys (Taper)",
                summary: "Kevennysjakso alkaa — volyymi laskee merkittävästi mutta terävyys säilyy. Keho latautuu kisaan.",
                tip: "Saatat tuntea olosi levottomaksi kun treenejä on vähemmän — se on normaalia! Keho kerää voimaa.",
                days: [
                    { day: "Maanantai", type: "Peruskestävyys", details: "Helppo tasavauhti", distance: 6, pace: "6:00–6:15" },
                    { day: "Tiistai", type: "Lepo", details: "Täysi lepo", distance: 0, pace: "-" },
                    { day: "Keskiviikko", type: "Vauhtikestävyys", details: "1,5 km lämmittely + 4×1000m (5:30/km) + 1,5 km jäähdyttely", distance: 7, pace: "5:30 intervalliosuudet" },
                    { day: "Torstai", type: "Lepo", details: "Palautumispäivä", distance: 0, pace: "-" },
                    { day: "Perjantai", type: "Tempojuoksu", details: "1,5 km lämmittely + 4 km kisavauhtia (5:40/km) + 1,5 km jäähdyttely", distance: 7, pace: "5:40 tempo-osuus" },
                    { day: "Lauantai", type: "Lepo tai kävely", details: "Aktiivinen palautuminen", distance: 0, pace: "-" },
                    { day: "Sunnuntai", type: "Pitkä lenkki", details: "Viimeinen pitkä lenkki ennen kisaa", distance: 12, pace: "6:00–6:15" }
                ]
            },
            {
                week: 12,
                phase: "taper",
                phaseLabel: "Kisaviikko",
                summary: "Kisaviikko! Minimaalinen harjoittelu — jalat tuoreina kisapäivänä. Keskity lepoon ja ravintoon.",
                tip: "Täytä glykogeenivarastot 2–3 päivää ennen kisaa (pasta, riisi, peruna). Vältä uusia ruokia. Nuku hyvin erityisesti 2 yötä ennen kisaa.",
                days: [
                    { day: "Maanantai", type: "Kevyt lenkki", details: "Lyhyt helppo lenkki", distance: 5, pace: "6:10–6:20" },
                    { day: "Tiistai", type: "Lepo", details: "Täysi lepo", distance: 0, pace: "-" },
                    { day: "Keskiviikko", type: "Aktivointi", details: "3 km helppo + 4×200m kisavauhtia", distance: 4, pace: "6:00 + vedot 5:30" },
                    { day: "Torstai", type: "Lepo", details: "Täysi lepo", distance: 0, pace: "-" },
                    { day: "Perjantai", type: "Ravistelu", details: "2–3 km todella kevyttä hölkkää", distance: 3, pace: "6:30+" },
                    { day: "Lauantai", type: "Lepo", details: "Täysi lepo — valmistele kisavarusteet", distance: 0, pace: "-" },
                    { day: "Sunnuntai", type: "KILPAILU!", details: "Puolimaraton — tavoite alle 2:00:00!", distance: 21.1, pace: "5:41 tavoitevauhti" }
                ]
            }
        ];

        let currentWeek = 0;

        function getRaceDate() {
            const today = new Date(2026, 4, 4);
            const race = new Date(today);
            race.setDate(race.getDate() + 12 * 7);
            return race;
        }

        function formatDate(date) {
            const days = ['su', 'ma', 'ti', 'ke', 'to', 'pe', 'la'];
            const months = ['tammi', 'helmi', 'maalis', 'huhti', 'touko', 'kesä', 'heinä', 'elo', 'syys', 'loka', 'marras', 'joulu'];
            return `${date.getDate()}. ${months[date.getMonth()]}kuuta`;
        }

        function getCurrentWeekIndex() {
            const today = new Date();
            const start = new Date(2026, 4, 5);
            const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
            const weekIndex = Math.floor(diffDays / 7);
            return Math.max(0, Math.min(weekIndex, 11));
        }

        function changeWeek(delta) {
            currentWeek = Math.max(0, Math.min(11, currentWeek + delta));
            render();
        }

        function render() {
            const week = trainingPlan[currentWeek];

            document.getElementById('weekLabel').textContent = `Viikko ${week.week} / 12`;
            document.getElementById('prevWeek').disabled = currentWeek === 0;
            document.getElementById('nextWeek').disabled = currentWeek === 11;

            const phaseClass = `phase-${week.phase}`;
            document.getElementById('phaseInfo').innerHTML = `<span class="phase-badge ${phaseClass}">${week.phaseLabel}</span>`;

            document.getElementById('weekSummary').innerHTML = `<h3>Viikon tavoite</h3><p>${week.summary}</p>`;

            let totalDist = 0;
            let runDays = 0;
            let scheduleHtml = '';

            week.days.forEach(d => {
                totalDist += d.distance;
                if (d.distance > 0) runDays++;

                const isRest = d.distance === 0;
                scheduleHtml += `
                    <div class="day-card ${isRest ? 'rest' : ''}">
                        <div class="day-name">${d.day}</div>
                        <div class="day-workout">
                            <div class="type">${d.type}</div>
                            <div class="details">${d.details}</div>
                        </div>
                        <div class="day-stats">
                            <div class="distance">${d.distance > 0 ? d.distance + ' km' : 'Lepo'}</div>
                            <div class="pace">${d.pace}</div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('schedule').innerHTML = scheduleHtml;

            document.getElementById('totals').innerHTML = `
                <div class="total-item">
                    <div class="num">${totalDist.toFixed(1)}</div>
                    <div class="desc">km viikossa</div>
                </div>
                <div class="total-item">
                    <div class="num">${runDays}</div>
                    <div class="desc">juoksupäivää</div>
                </div>
                <div class="total-item">
                    <div class="num">${(7 - runDays)}</div>
                    <div class="desc">lepopäivää</div>
                </div>
                <div class="total-item">
                    <div class="num">${Math.round(totalDist / runDays * 10) / 10}</div>
                    <div class="desc">km / juoksupäivä</div>
                </div>
            `;

            const progress = ((currentWeek + 1) / 12) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressText').textContent = `${Math.round(progress)}% ohjelmasta`;

            document.getElementById('tipBox').innerHTML = `<h4>Viikon vinkki</h4><p>${week.tip}</p>`;
        }

        document.getElementById('raceDate').textContent = formatDate(getRaceDate());
        currentWeek = getCurrentWeekIndex();
        render();
    </script>
</body>
</html>
