                days: [

        ];

        let currentWeek = 0;

        function getRaceDate() {
            const today = new Date(2026, 4, 4);
            const race = new Date(today);
            race.setDate(race.getDate() + 12 * 7);
            return race;
        }

        function formatDate(date) {
            const days = ['su', 'ma', 'ti', 'ke', 'to', 'pe', 'la'];
            const months = ['tammi', 'helmi', 'maalis', 'huhti', 'touko', 'kesä', 'heinä', 'elo', 'syys', 'loka', 'marras', 'joulu'];
            return `${date.getDate()}. ${months[date.getMonth()]}kuuta`;
        }

        function getCurrentWeekIndex() {
            const today = new Date();
            const start = new Date(2026, 4, 5);
            const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
            const weekIndex = Math.floor(diffDays / 7);
            return Math.max(0, Math.min(weekIndex, 11));
        }

        function changeWeek(delta) {
            currentWeek = Math.max(0, Math.min(11, currentWeek + delta));
            render();
        }

        function render() {
            const week = trainingPlan[currentWeek];

            document.getElementById('weekLabel').textContent = `${T('week')} ${week.week} / 12`;
            document.getElementById('prevWeek').disabled = currentWeek === 0;
            document.getElementById('nextWeek').disabled = currentWeek === 11;

            const phaseClass = `phase-${week.phase}`;
            const phaseLabel = currentLang === 'en' ? (trainingPlanEN.phaseLabels[week.phaseLabel] || week.phaseLabel) : week.phaseLabel;
            document.getElementById('phaseInfo').innerHTML = `<span class="phase-badge ${phaseClass}">${phaseLabel}</span>`;

            const summary = currentLang === 'en' ? trainingPlanEN.summaries[currentWeek] : week.summary;
            document.getElementById('weekSummary').innerHTML = `<h3>${T('week_goal')}</h3><p>${summary}</p>`;

            let totalDist = 0;
            let runDays = 0;
            let scheduleHtml = '';

            week.days.forEach(d => {
                totalDist += d.distance;
                if (d.distance > 0) runDays++;

                const isRest = d.distance === 0;
                const dayName = currentLang === 'en' ? (translations.en.days[d.day] || d.day) : d.day;
                scheduleHtml += `
                    <div class="day-card ${isRest ? 'rest' : ''}">
                        <div class="day-name">${dayName}</div>
                        <div class="day-workout">
                            <div class="type">${d.type}</div>
                            <div class="details">${d.details}</div>
                        </div>
                        <div class="day-stats">
                            <div class="distance">${d.distance > 0 ? d.distance + ' km' : T('rest')}</div>
                            <div class="pace">${d.pace}</div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('schedule').innerHTML = scheduleHtml;

            document.getElementById('totals').innerHTML = `
                <div class="total-item">
                    <div class="num">${totalDist.toFixed(1)}</div>
                    <div class="desc">${T('km_week')}</div>
                </div>
                <div class="total-item">
                    <div class="num">${runDays}</div>
                    <div class="desc">${T('run_days')}</div>
                </div>
                <div class="total-item">
                    <div class="num">${(7 - runDays)}</div>
                    <div class="desc">${T('rest_days')}</div>
                </div>
                <div class="total-item">
                    <div class="num">${Math.round(totalDist / runDays * 10) / 10}</div>
                    <div class="desc">${T('km_per_day')}</div>
                </div>
            `;

            const progress = ((currentWeek + 1) / 12) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressText').textContent = `${Math.round(progress)}% ${T('of_program')}`;

            const tip = currentLang === 'en' ? trainingPlanEN.tips[currentWeek] : week.tip;
            document.getElementById('tipBox').innerHTML = `<h4>${T('weekly_tip')}</h4><p>${tip}</p>`;
        }

        const translations = {

                subtitle: 'Tavoite: alle 2:00:00 — 12 viikon ohjelma',

        const trainingPlanEN = {

                "Base fitness — get used to regular training. All runs at easy aerobic pace.",
                "Continue building the base — small volume increases.",
                "Last week of base phase — find rhythm before build phase.",
                "Build phase begins — intensity rises, long run gets longer. Tempo sections approach race pace.",
                "Volume and intensity continue to grow. Long run 16 km.",
                "Final build week — recovery week approaching, but one more hard week.",
                "Recovery week — volume drops 30% but intensity remains. Let the body adapt.",
                "Peak phase begins — this is the hardest training block. Long runs close to half marathon distance.",
                "Hardest week of the program — longest run 20 km. After this, tapering towards race.",
                "Second recovery week — body needs to recover after the long run and hard block.",
                "Taper begins — volume drops significantly but sharpness remains. Body charges for race.",
                "Race week! Minimal training — fresh legs on race day. Focus on rest and nutrition."
            ],
            tips: [
                "Start easy! First weeks' goal is to create routine and let the body adapt. Run so you can speak full sentences.",
                "Listen to your body. Small muscle soreness is normal, but sharp pain means you need rest.",
                "Ensure enough sleep (7-9h) and good nutrition. Carbohydrates are a runner's fuel!",
                "From this week, tempo sections are near race pace (5:41/km). Learn to feel this pace in your body.",
                "Practice drinking during runs. On long runs, take water or sports drink every 15-20 min.",

                "20 km run is a big mental achievement. Remember: on race day, adrenaline carries the last distance!",

                'Kisaviikko': 'Race week'
            }
        };

        let currentLang = 'fi';

        function T(key) {
            return translations[currentLang][key] || key;
        }

        function setAppLang(lang) {
            currentLang = lang;
            document.getElementById('lang-fi').classList.toggle('active', lang === 'fi');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
            render();
        }

        document.getElementById('raceDate').textContent = formatDate(getRaceDate());
        currentWeek = getCurrentWeekIndex();
        render();
    </script>
