<script>
const HELSINKI_LAT = 60.1699;
const HELSINKI_LON = 24.9384;

let currentLang = 'fi';
let selectedDay = 0;
let weatherData = {};

const TEXTS = {

        dry: 'Dry',

        rainy: 'Rainy',

        agreeNone: 'All services: no significant rain',
        agreeRain: 'All services: rain expected',
        disagree: 'Services disagree on rain',
        verdictExcellent: 'Definitely go cycling!',
        verdictGood: 'Good for cycling',
        verdictCaution: 'Consider alternatives',
        verdictBad: 'Stay home or take the bus',
        reasonDry: 'Dry day, comfortable wind — perfect cycling weather!',
        reasonLight: 'Some rain possible — bring a rain jacket just in case.',
        reasonModerate: 'Rain forecast by multiple sources — car or bus might be better.',
        reasonHeavy: 'Heavy rain expected — stay dry indoors or choose the bus.',
        reasonWind: 'Strong wind makes cycling uncomfortable.',
        hourlyRain: 'Hourly rain',

        error: 'Failed to fetch',

};

function T(key) { return TEXTS[currentLang][key] || key; }

function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim().includes(lang.toUpperCase())));
    document.getElementById('lang-fi').classList.toggle('active', lang === 'fi');
    document.getElementById('lang-en').classList.toggle('active', lang === 'en');
    renderAll();
}

function formatDate(d) {
    const days_fi = ['su','ma','ti','ke','to','pe','la'];
    const days_en = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const days = currentLang === 'fi' ? days_fi : days_en;
    return days[d.getDay()] + ' ' + d.getDate() + '.' + (d.getMonth()+1) + '.';
}

async function fetchOpenMeteo() {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${HELSINKI_LAT}&longitude=${HELSINKI_LON}&hourly=temperature_2m,precipitation,weathercode,windspeed_10m&timezone=Europe/Helsinki&forecast_days=3`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('Open-Meteo HTTP ' + res.status);
    const data = await res.json();
    return {
        name: 'Open-Meteo',
        hours: data.hourly.time.map((t, i) => ({
            time: new Date(t),
            temp: data.hourly.temperature_2m[i],
            rain: data.hourly.precipitation[i],
            wind: data.hourly.windspeed_10m[i],
            code: data.hourly.weathercode[i]
        }))
    };
}

async function fetchMETNorway() {
    const url = `https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${HELSINKI_LAT}&lon=${HELSINKI_LON}`;
    const res = await fetch(url, {
        headers: { 'User-Agent': 'HelsinkiWeatherApp/1.0 github.com/weather-comparison' }
    });
    if (!res.ok) throw new Error('MET Norway HTTP ' + res.status);
    const data = await res.json();
    const timeseries = data.properties.timeseries;
    return {
        name: 'MET Norway (Yr)',
        hours: timeseries.map(ts => ({
            time: new Date(ts.time),
            temp: ts.data.instant.details.air_temperature,
            rain: ts.data.next_1_hours ? ts.data.next_1_hours.details.precipitation_amount : (ts.data.next_6_hours ? ts.data.next_6_hours.details.precipitation_amount / 6 : 0),
            wind: ts.data.instant.details.wind_speed * 3.6,
            code: null
        }))
    };
}

async function fetchFMI() {
    const now = new Date();
    const start = new Date(now);
    start.setHours(0,0,0,0);
    const end = new Date(start);
    end.setDate(end.getDate() + 3);

    const startStr = start.toISOString().split('.')[0] + 'Z';
    const endStr = end.toISOString().split('.')[0] + 'Z';

    const url = `https://opendata.fmi.fi/wfs?service=WFS&version=2.0.0&request=getFeature&storedquery_id=fmi::forecast::harmonie::surface::point::simple&place=Helsinki&parameters=Precipitation1h,Temperature,WindSpeedMS&starttime=${startStr}&endtime=${endStr}&timestep=60`;

    const res = await fetch(url);
    if (!res.ok) throw new Error('FMI HTTP ' + res.status);
    const text = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'application/xml');
    const members = xml.querySelectorAll('BsWfs\\:BsWfsElement, BsWfsElement');

    const hourMap = {};
    members.forEach(m => {
        const time = (m.querySelector('BsWfs\\:Time, Time') || {}).textContent;
        const param = (m.querySelector('BsWfs\\:ParameterName, ParameterName') || {}).textContent;
        const val = parseFloat((m.querySelector('BsWfs\\:ParameterValue, ParameterValue') || {}).textContent);
        if (!time) return;
        if (!hourMap[time]) hourMap[time] = { time: new Date(time) };
        if (param === 'Precipitation1h') hourMap[time].rain = val;
        if (param === 'Temperature') hourMap[time].temp = val;
        if (param === 'WindSpeedMS') hourMap[time].wind = val * 3.6;
    });

    return {
        name: 'Ilmatieteen laitos (FMI)',
        hours: Object.values(hourMap).sort((a,b) => a.time - b.time).map(h => ({
            ...h,
            rain: h.rain || 0,
            temp: h.temp || 0,
            wind: h.wind || 0,
            code: null
        }))
    };
}

function getDayData(source, dayOffset) {
    const now = new Date();
    const dayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() + dayOffset, 0, 0, 0);
    const dayEnd = new Date(dayStart);
    dayEnd.setDate(dayEnd.getDate() + 1);

    const hours = source.hours.filter(h => h.time >= dayStart && h.time < dayEnd);

    if (hours.length === 0) return null;

    const totalRain = hours.reduce((s, h) => s + (h.rain || 0), 0);
    const maxRain = Math.max(...hours.map(h => h.rain || 0));
    const avgTemp = hours.reduce((s, h) => s + h.temp, 0) / hours.length;
    const maxWind = Math.max(...hours.map(h => h.wind || 0));

    return { hours, totalRain, maxRain, avgTemp, maxWind };
}

function getRainLevel(totalRain) {
    if (totalRain < 0.5) return 'dry';
    if (totalRain < 3) return 'light';
    if (totalRain < 8) return 'moderate';
    return 'heavy';
}

function getBadgeInfo(totalRain) {
    if (totalRain < 0.5) return { class: 'badge-dry', text: () => T('noRain') };
    if (totalRain < 3) return { class: 'badge-light', text: () => T('lightRain') };
    return { class: 'badge-rain', text: () => T('heavyRain') };
}

function getCyclingRecommendation(sources, dayOffset) {
    const dayDatas = sources.map(s => getDayData(s, dayOffset)).filter(Boolean);
    if (dayDatas.length === 0) return { level: 'good', verdict: T('verdictGood'), reason: '' };

    const avgTotalRain = dayDatas.reduce((s, d) => s + d.totalRain, 0) / dayDatas.length;
    const maxTotalRain = Math.max(...dayDatas.map(d => d.totalRain));
    const avgMaxWind = dayDatas.reduce((s, d) => s + d.maxWind, 0) / dayDatas.length;
    const rainyCount = dayDatas.filter(d => d.totalRain >= 1).length;

    if (avgMaxWind > 55) {
        return { level: 'bad', verdict: T('verdictBad'), reason: T('reasonWind') };
    }
    if (maxTotalRain >= 8 || (rainyCount >= 2 && avgTotalRain >= 5)) {
        return { level: 'bad', verdict: T('verdictBad'), reason: T('reasonHeavy') };
    }
    if (avgTotalRain >= 2 || rainyCount >= 2) {
        return { level: 'caution', verdict: T('verdictCaution'), reason: T('reasonModerate') };
    }
    if (avgTotalRain >= 0.5 || rainyCount >= 1) {
        return { level: 'good', verdict: T('verdictGood'), reason: T('reasonLight') };
    }
    return { level: 'excellent', verdict: T('verdictExcellent'), reason: T('reasonDry') };
}

function getConsensus(sources, dayOffset) {
    const dayDatas = sources.map(s => getDayData(s, dayOffset)).filter(Boolean);
    const rainyCount = dayDatas.filter(d => d.totalRain >= 1).length;
    const total = dayDatas.length;

    if (rainyCount === 0) return { type: 'dry', text: T('agreeNone'), pct: 100 };
    if (rainyCount === total) return { type: 'rainy', text: T('agreeRain'), pct: 100 };
    return { type: 'mixed', text: T('disagree'), pct: Math.round((rainyCount / total) * 100) };
}

function renderRecommendation(sources) {
    const rec = getCyclingRecommendation(sources, selectedDay);
    const icons = { excellent: '☀️🚴', good: '🌤️🚴', caution: '🌧️🤔', bad: '🌧️🚌' };
    document.getElementById('recommendation').innerHTML = `
        <div class="recommendation-card ${rec.level}">
            <div class="icon">${icons[rec.level]}</div>
            <div class="verdict">${rec.verdict}</div>
            <div class="reason">${rec.reason}</div>
        </div>
    `;
}

function renderDayTabs() {
    const container = document.getElementById('day-tabs');
    container.innerHTML = '';
    for (let i = 0; i < 2; i++) {
        const d = new Date();
        d.setDate(d.getDate() + i);
        const label = i === 0 ? T('today') : T('tomorrow');
        const btn = document.createElement('button');
        btn.className = 'day-tab' + (i === selectedDay ? ' active' : '');
        btn.innerHTML = `<span class="day-name">${label}</span><span class="day-date">${formatDate(d)}</span>`;
        btn.onclick = () => { selectedDay = i; renderAll(); };
        container.appendChild(btn);
    }
}

function renderSourceCards(sources) {
    const container = document.getElementById('source-cards');
    container.innerHTML = '';

    sources.forEach(source => {
        const dayData = getDayData(source, selectedDay);
        if (!dayData) return;

        const badge = getBadgeInfo(dayData.totalRain);
        const card = document.createElement('div');
        card.className = 'source-card';

        let barsHtml = '';
        const relevantHours = dayData.hours.filter(h => {
            const hr = h.time.getHours();
            return hr >= 6 && hr <= 22;
        });
        const maxBarRain = Math.max(3, ...relevantHours.map(h => h.rain || 0));

        relevantHours.forEach(h => {
            const rain = h.rain || 0;
            const pct = Math.max(3, (rain / maxBarRain) * 100);
            let cls = 'rain-0';
            if (rain > 0.1) cls = 'rain-1';
            if (rain > 1) cls = 'rain-2';
            if (rain > 3) cls = 'rain-3';
            const hr = h.time.getHours();
            const showLabel = hr % 3 === 0;
            barsHtml += `<div class="hour-bar-wrapper">
                <div class="hour-bar ${cls}" style="height:${pct}%" title="${hr}:00 — ${rain.toFixed(1)} mm"></div>
                ${showLabel ? `<span class="hour-label">${hr}</span>` : ''}
            </div>`;
        });

        card.innerHTML = `
            <div class="source-header">
                <span class="source-name">${source.name}</span>
                <span class="source-badge ${badge.class}">${badge.text()}</span>
            </div>
            <div class="rain-summary">
                <div class="rain-stat">
                    <div class="label">${T('totalRain')}</div>
                    <div class="value">${dayData.totalRain.toFixed(1)} <span class="unit">mm</span></div>
                </div>
                <div class="rain-stat">
                    <div class="label">${T('maxRainH')}</div>
                    <div class="value">${dayData.maxRain.toFixed(1)} <span class="unit">mm/h</span></div>
                </div>
            </div>
            <div style="font-size:0.7rem;color:#94a3b8;margin-bottom:2px">${T('hourlyRain')} (6–22)</div>
            <div class="hourly-bars">${barsHtml}</div>
            <div class="temp-wind-row">
                <div class="tw-item">${T('avgTemp')}: <strong>${dayData.avgTemp.toFixed(1)}&deg;C</strong></div>
                <div class="tw-item">${T('maxWind')}: <strong>${dayData.maxWind.toFixed(0)} km/h</strong></div>
            </div>
        `;
        container.appendChild(card);
    });
}

function renderConsensus(sources) {
    const consensus = getConsensus(sources, selectedDay);
    document.getElementById('consensus-section').innerHTML = `
        <div class="consensus-box">
            <div class="consensus-title">${T('consensus')}</div>
            <div class="consensus-meter">
                <div class="consensus-fill ${consensus.type}" style="width:${consensus.pct}%"></div>
            </div>
            <div class="consensus-text">${consensus.text}</div>
        </div>
    `;
}

function renderSummaryTable(sources) {
    let rows = '';
    sources.forEach(source => {
        const dayData = getDayData(source, selectedDay);
        if (!dayData) return;
        rows += `<tr>
            <td><strong>${source.name}</strong></td>
            <td>${dayData.totalRain.toFixed(1)} mm</td>
            <td>${dayData.avgTemp.toFixed(1)}&deg;C</td>
            <td>${dayData.maxWind.toFixed(0)} km/h</td>
        </tr>`;
    });

    document.getElementById('summary-table').innerHTML = `
        <table class="comparison-table">
            <thead>
                <tr>
                    <th>${T('source')}</th>
                    <th>${T('rain')}</th>
                    <th>${T('temp')}</th>
                    <th>${T('wind')}</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
    `;
}

function renderAll() {
    document.getElementById('h-title').textContent = T('title');
    document.getElementById('h-subtitle').textContent = T('subtitle');
    document.getElementById('lbl-rain-comparison').textContent = T('rainComparison');
    document.getElementById('lbl-summary-table').textContent = T('summaryTable');

    const sources = Object.values(weatherData);
    if (sources.length === 0) return;

    renderDayTabs();
    renderRecommendation(sources);
    renderSourceCards(sources);
    renderConsensus(sources);
    renderSummaryTable(sources);
}

async function init() {
    const fetchers = [
        { fn: fetchOpenMeteo, key: 'openmeteo' },
        { fn: fetchMETNorway, key: 'met' },
        { fn: fetchFMI, key: 'fmi' },
    ];

    const results = await Promise.allSettled(fetchers.map(f => f.fn()));

    let errors = [];
    results.forEach((r, i) => {
        if (r.status === 'fulfilled') {
            weatherData[fetchers[i].key] = r.value;
        } else {
            errors.push(fetchers[i].key + ': ' + r.reason.message);
        }
    });

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    if (errors.length > 0 && Object.keys(weatherData).length > 0) {
        const errDiv = document.createElement('div');
        errDiv.className = 'error-msg';
        errDiv.textContent = T('error') + ': ' + errors.join(', ');
        document.getElementById('content').prepend(errDiv);
    }

    if (Object.keys(weatherData).length === 0) {
        document.getElementById('content').innerHTML = '<div class="error-msg">Kaikkien palvelujen haku epäonnistui. Yritä myöhemmin.</div>';
        return;
    }

    renderAll();
}

init();
</script>
