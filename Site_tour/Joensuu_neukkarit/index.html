<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neukkarit - Siili Joensuu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --pri: #0d9488;
            --pri-dark: #0f766e;
            --pri-light: #ccfbf1;
            --pri-bg: #f0fdfa;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-sec: #5a5a7a;
            --text-light: #8888a0;
            --border: #e2e8f0;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.10);
            --radius: 12px;
            --header-h: 56px;
            --ok: #10b981;
            --remote: #3b82f6;
            --away: #94a3b8;
            --warn: #f59e0b;
            --err: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d52 100%);
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .logo span { color: var(--pri); }

        .header-title {
            color: rgba(255,255,255,0.6);
            font-size: 0.78rem;
            font-weight: 400;
            border-left: 1px solid rgba(255,255,255,0.2);
            padding-left: 14px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lang-switcher {
            display: flex;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 100px;
            overflow: hidden;
        }

        .lang-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            font-size: 0.72rem;
            font-weight: 500;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .lang-btn.active {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        .date-display {
            color: rgba(255,255,255,0.8);
            font-size: 0.82rem;
            font-weight: 500;
        }

        /* Nav tabs */
        .nav-bar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 4px;
            position: sticky;
            top: var(--header-h);
            z-index: 999;
        }

        .nav-tab {
            padding: 14px 20px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-sec);
            border: none;
            background: none;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-tab:hover {
            color: var(--pri);
            background: var(--pri-bg);
        }

        .nav-tab.active {
            color: var(--pri);
            border-bottom-color: var(--pri);
            font-weight: 600;
        }

        .nav-tab .tab-icon {
            font-size: 1rem;
        }

        .nav-tab .tab-badge {
            background: var(--pri-light);
            color: var(--pri);
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 10px;
        }

        .nav-tab.active .tab-badge {
            background: var(--pri);
            color: #fff;
        }

        /* Main */
        .main {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 24px;
        }

        .view { display: none; }
        .view.active { display: block; }

        /* Date navigation */
        .date-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .date-nav-btn {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            cursor: pointer;
            color: var(--text-sec);
            font-size: 14px;
            transition: all 0.15s;
        }

        .date-nav-btn:hover {
            background: var(--pri-bg);
            color: var(--pri);
            border-color: var(--pri);
        }

        .date-nav-label {
            font-size: 1.1rem;
            font-weight: 700;
            min-width: 220px;
            text-align: center;
        }

        .date-nav-label .today-tag {
            font-size: 0.7rem;
            font-weight: 600;
            background: var(--pri);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            transition: all 0.15s;
            font-family: inherit;
        }

        .btn:hover { background: #f0f0f0; }

        .btn-pri {
            background: var(--pri);
            color: #fff;
            border-color: var(--pri);
        }

        .btn-pri:hover {
            background: var(--pri-dark);
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 0.75rem;
        }

        .btn-today {
            margin-left: auto;
        }

        /* Room cards grid */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }

        .room-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: all 0.25s;
        }

        .room-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-1px);
        }

        .room-card-header {
            padding: 16px 20px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .room-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .room-name {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .room-meta {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.72rem;
            color: var(--text-light);
        }

        .room-status {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .room-status.free { background: #d1fae5; color: #065f46; }
        .room-status.busy { background: #fee2e2; color: #991b1b; }
        .room-status.soon { background: #fef3c7; color: #92400e; }

        .room-timeline {
            padding: 12px 20px;
            min-height: 60px;
        }

        .timeline-bar {
            position: relative;
            height: 36px;
            background: #f1f5f9;
            border-radius: 6px;
            overflow: hidden;
        }

        .timeline-slot {
            position: absolute;
            top: 3px;
            bottom: 3px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            padding: 0 6px;
            overflow: hidden;
        }

        .timeline-slot:hover {
            filter: brightness(0.9);
            transform: scaleY(1.1);
            z-index: 2;
        }

        .timeline-slot-text {
            font-size: 0.6rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .timeline-now {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--err);
            z-index: 5;
        }

        .timeline-now::after {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            width: 8px;
            height: 8px;
            background: var(--err);
            border-radius: 50%;
        }

        .timeline-hours {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            padding: 0 1px;
        }

        .timeline-hour {
            font-size: 0.6rem;
            color: var(--text-light);
        }

        .room-bookings {
            padding: 0 20px 16px;
        }

        .booking-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: background 0.15s;
            cursor: pointer;
        }

        .booking-item:hover { background: #f8fafc; }

        .booking-time {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--pri);
            min-width: 85px;
        }

        .booking-subject {
            font-size: 0.82rem;
            font-weight: 600;
            flex: 1;
        }

        .booking-people {
            display: flex;
            gap: -6px;
        }

        .avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            font-weight: 700;
            color: #fff;
            border: 2px solid var(--card);
            flex-shrink: 0;
        }

        .avatar-stack {
            display: flex;
        }

        .avatar-stack .avatar:not(:first-child) {
            margin-left: -8px;
        }

        .booking-organizer-presence {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .presence-office { background: var(--ok); }
        .presence-remote { background: var(--remote); }
        .presence-away { background: var(--away); }

        .room-card-actions {
            padding: 0 20px 16px;
        }

        .btn-book {
            width: 100%;
            justify-content: center;
            background: var(--pri-bg);
            color: var(--pri);
            border-color: var(--pri-light);
            font-weight: 600;
        }

        .btn-book:hover {
            background: var(--pri);
            color: #fff;
        }

        /* People view */
        .presence-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 16px 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
        }

        .stat-number.office { color: var(--ok); }
        .stat-number.remote { color: var(--remote); }
        .stat-number.away { color: var(--away); }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .people-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-sec);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-btn {
            padding: 5px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: var(--card);
            cursor: pointer;
            font-size: 0.72rem;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--text-sec);
            font-family: inherit;
        }

        .filter-btn:hover {
            border-color: var(--pri);
            color: var(--pri);
        }

        .filter-btn.active {
            background: var(--pri);
            color: #fff;
            border-color: var(--pri);
        }

        .people-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .person-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }

        .person-card:hover {
            box-shadow: var(--shadow-hover);
        }

        .person-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            position: relative;
        }

        .person-avatar .presence-dot {
            position: absolute;
            bottom: -1px;
            right: -1px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--card);
        }

        .person-info {
            flex: 1;
            min-width: 0;
        }

        .person-name {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .person-role {
            font-size: 0.7rem;
            color: var(--text-light);
        }

        .person-status {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .status-office { background: #d1fae5; color: #065f46; }
        .status-remote { background: #dbeafe; color: #1e40af; }
        .status-away { background: #f1f5f9; color: #64748b; }

        /* Timeline view */
        .full-timeline {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .ft-header {
            display: grid;
            grid-template-columns: 140px repeat(18, 1fr);
            border-bottom: 2px solid var(--border);
            background: #f9fafb;
        }

        .ft-header-cell {
            padding: 8px 4px;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-light);
            text-align: center;
            border-left: 1px solid var(--border);
        }

        .ft-header-cell:first-child {
            border-left: none;
            text-align: left;
            padding-left: 16px;
            font-size: 0.72rem;
            color: var(--text-sec);
        }

        .ft-header-cell.now {
            color: var(--err);
            font-weight: 700;
        }

        .ft-row {
            display: grid;
            grid-template-columns: 140px 1fr;
            border-bottom: 1px solid var(--border);
            min-height: 56px;
        }

        .ft-row:last-child { border-bottom: none; }

        .ft-row:hover { background: #fafbfc; }

        .ft-room-label {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            border-right: 1px solid var(--border);
        }

        .ft-room-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .ft-room-cap {
            font-size: 0.65rem;
            color: var(--text-light);
            font-weight: 400;
        }

        .ft-timeline-area {
            position: relative;
            padding: 6px 0;
        }

        .ft-slot {
            position: absolute;
            top: 4px;
            bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0 8px;
            overflow: hidden;
            transition: filter 0.15s;
        }

        .ft-slot:hover {
            filter: brightness(0.85);
            z-index: 2;
        }

        .ft-slot-text {
            font-size: 0.7rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .ft-now-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--err);
            z-index: 10;
            pointer-events: none;
        }

        .ft-grid-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--border);
            opacity: 0.5;
            pointer-events: none;
        }

        /* Modal / booking dialog */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--card);
            border-radius: 16px;
            max-width: 480px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .modal-header {
            padding: 20px 24px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .modal-close:hover { background: #e0e0e0; }

        .modal-body {
            padding: 16px 24px 24px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-sec);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.88rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            background: var(--card);
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--pri);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* Tooltip */
        .tooltip {
            display: none;
            position: fixed;
            z-index: 3000;
            background: var(--text);
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.78rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            max-width: 280px;
            pointer-events: none;
        }

        .tooltip.show { display: block; }

        .tooltip-subject {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .tooltip-time {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 6px;
        }

        .tooltip-person {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            margin-bottom: 2px;
        }

        .tooltip-person .mini-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--text);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 0 16px;
                height: auto;
                min-height: var(--header-h);
                flex-wrap: wrap;
                gap: 8px;
                padding-top: 8px;
                padding-bottom: 8px;
            }

            .header-title { display: none; }

            .nav-bar {
                overflow-x: auto;
                padding: 0 12px;
                -webkit-overflow-scrolling: touch;
            }

            .nav-tab {
                white-space: nowrap;
                padding: 12px 14px;
                font-size: 0.78rem;
            }

            .main { padding: 16px; }

            .rooms-grid {
                grid-template-columns: 1fr;
            }

            .people-grid {
                grid-template-columns: 1fr;
            }

            .presence-stats {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .date-nav-label {
                font-size: 0.95rem;
                min-width: auto;
            }

            .full-timeline { overflow-x: auto; }

            .ft-header, .ft-row {
                min-width: 900px;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .room-card, .person-card {
            animation: fadeIn 0.3s ease forwards;
        }

        /* Empty state */
        .empty-bookings {
            text-align: center;
            padding: 16px;
            color: var(--text-light);
            font-size: 0.82rem;
        }

        /* Person filter bar */
        .person-filter-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .person-search-wrap {
            position: relative;
            flex: 1;
            max-width: 360px;
        }

        .person-search-wrap::before {
            content: '\1F50D';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .person-search {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            background: var(--card);
        }

        .person-search:focus { border-color: var(--pri); }

        .person-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-top: 4px;
            box-shadow: var(--shadow-hover);
            max-height: 240px;
            overflow-y: auto;
            z-index: 500;
            display: none;
        }

        .person-suggestions.show { display: block; }

        .person-sug-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            cursor: pointer;
            transition: background 0.1s;
            font-size: 0.82rem;
        }

        .person-sug-item:hover { background: var(--pri-bg); }

        .person-sug-item .sug-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .person-sug-item .sug-name { font-weight: 600; }
        .person-sug-item .sug-role { font-size: 0.7rem; color: var(--text-light); margin-left: 4px; }

        .person-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--pri);
            color: #fff;
            padding: 6px 10px 6px 14px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            animation: fadeIn 0.2s ease;
        }

        .person-chip-close {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.3);
            color: #fff;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .person-chip-close:hover { background: rgba(255,255,255,0.5); }

        .person-filter-summary {
            font-size: 0.78rem;
            color: var(--text-sec);
            margin-left: 4px;
        }

        /* Dimmed/highlighted booking states */
        .room-card.dimmed { opacity: 0.35; transition: opacity 0.3s; }
        .room-card.highlighted { opacity: 1; border-color: var(--pri); box-shadow: 0 0 0 2px var(--pri-light), var(--shadow-hover); }
        .booking-item.dimmed { opacity: 0.25; }
        .booking-item.highlighted { background: var(--pri-bg) !important; border-left: 3px solid var(--pri); }
        .timeline-slot.dimmed { opacity: 0.15; }
        .timeline-slot.highlighted { filter: brightness(1.1); box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--pri); z-index: 3; }
    </style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <div class="logo">siili<span>.</span> Neukkarit</div>
        <div class="header-title" data-i18n="headerTitle">Joensuun toimiston kokoushuoneet</div>
    </div>
    <div class="header-right">
        <div class="date-display" id="headerDate"></div>
        <a href="guide.html" style="color:#94a3b8;text-decoration:none;font-size:0.82rem;font-weight:600;margin-right:12px" data-i18n="guideLink">Käyttöohje &rarr;</a>
        <div class="lang-switcher">
            <button class="lang-btn active" data-lang="fi">FI</button>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
    </div>
</header>

<nav class="nav-bar">
    <button class="nav-tab" data-view="rooms">
        <span class="tab-icon">&#9632;</span>
        <span data-i18n="tabRooms">Huoneet</span>
        <span class="tab-badge" id="roomsBadge">5</span>
    </button>
    <button class="nav-tab active" data-view="timeline">
        <span class="tab-icon">&#9776;</span>
        <span data-i18n="tabTimeline">Aikajana</span>
    </button>
    <button class="nav-tab" data-view="people">
        <span class="tab-icon">&#9679;</span>
        <span data-i18n="tabPeople">Ihmiset</span>
        <span class="tab-badge" id="peopleBadge">0</span>
    </button>
</nav>

<main class="main">

    <!-- Date nav (shared) -->
    <div class="date-nav">
        <button class="date-nav-btn" id="prevDay">&#9664;</button>
        <div class="date-nav-label" id="dateLabel"></div>
        <button class="date-nav-btn" id="nextDay">&#9654;</button>
        <button class="btn btn-sm btn-today" id="todayBtn" data-i18n="btnToday">Tanaan</button>
    </div>

    <!-- Rooms View -->
    <div class="view" id="rooms">
        <div class="person-filter-bar">
            <div class="person-search-wrap">
                <input type="text" class="person-search" id="personSearch" data-i18n-placeholder="phPersonSearch" placeholder="Kenen varaukset? Hae nimella...">
                <div class="person-suggestions" id="personSuggestions"></div>
            </div>
            <div id="personChip"></div>
            <div class="person-filter-summary" id="personFilterSummary"></div>
        </div>
        <div class="rooms-grid" id="roomsGrid"></div>
    </div>

    <!-- Timeline View -->
    <div class="view active" id="timeline">
        <div class="full-timeline" id="fullTimeline"></div>
    </div>

    <!-- People View -->
    <div class="view" id="people">
        <div class="presence-stats" id="presenceStats"></div>
        <div class="people-filters" id="peopleFilters"></div>
        <div class="people-grid" id="peopleGrid"></div>
    </div>

</main>

<!-- Booking Modal -->
<div class="modal-overlay" id="bookingModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle" data-i18n="modalBook">Varaa huone</h2>
            <button class="modal-close" id="modalClose">&#10005;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label" data-i18n="formRoom">Huone</label>
                <select class="form-select" id="formRoom"></select>
            </div>
            <div class="form-group">
                <label class="form-label" data-i18n="formSubject">Aihe</label>
                <input type="text" class="form-input" id="formSubject" data-i18n-placeholder="phSubject" placeholder="Esim. Sprint Planning">
            </div>
            <div class="form-group">
                <label class="form-label" data-i18n="formOrganizer">Varaaja</label>
                <select class="form-select" id="formOrganizer"></select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" data-i18n="formStart">Alkaa</label>
                    <select class="form-select" id="formStart"></select>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="formEnd">Paattyy</label>
                    <select class="form-select" id="formEnd"></select>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn" id="modalCancel" data-i18n="btnCancel">Peruuta</button>
                <button class="btn btn-pri" id="modalSave" data-i18n="btnBook">Varaa</button>
            </div>
        </div>
    </div>
</div>

<!-- Detail Tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
<script data-goatcounter="https://site-tour-2026.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
