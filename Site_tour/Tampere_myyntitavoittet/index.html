                    <div class="kpi-label">Painotettu arvo</div>
                    <div class="kpi-value" style="font-size:22px">${fmtM(totalWeighted)}</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Keskim. todennäköisyys</div>
                    <div class="kpi-value" style="font-size:22px">${projects.length > 0 ? fmtPct(projects.reduce((s,p) => s + p.probability, 0) / projects.length) : '–'}</div>
                </div>
            </div>

            ${byStage.length > 1 ? `
            <div style="margin-bottom:16px">
                <div class="filter-group-label" style="margin-bottom:8px">Jakauma vaiheittain</div>
                ${byStage.map(s => `
                <div class="progress-row">
                    <div class="progress-label">
                        <span class="name"><span class="status-dot" style="background:${s.color}"></span>${s.name} (${s.projects.length} kpl)</span>
                        <span class="font-mono">${fmtK(s.value)} | painotettu ${fmtK(s.weighted)}</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width:${totalValue > 0 ? (s.value / totalValue * 100) : 0}%;background:${s.color}"></div>
                    </div>
                </div>`).join('')}
            </div>` : ''}

            ${byBL.length > 1 ? `
            <div style="margin-bottom:16px">
                <div class="filter-group-label" style="margin-bottom:8px">Jakauma Business Lineittain</div>
                ${byBL.map(b => `
                <div class="progress-row">
                    <div class="progress-label">
                        <span class="name"><span class="status-dot" style="background:${b.color}"></span>${b.name} (${b.projects.length} kpl)</span>
                        <span class="font-mono">${fmtK(b.value)} | painotettu ${fmtK(b.weighted)}</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width:${totalValue > 0 ? (b.value / totalValue * 100) : 0}%;background:${b.color}"></div>
                    </div>
                </div>`).join('')}
            </div>` : ''}

            <div class="filter-group-label" style="margin-bottom:8px">Kaikki projektit</div>
            <div class="table-wrap">
            <table class="data-table">
                <thead><tr>
                    <th>Projekti</th><th>Asiakas</th><th>Business Line</th><th>Vastuuhenkilö</th><th>Vaihe</th>
                    <th class="text-right">Arvo</th><th class="text-right">Painotettu</th><th>Sulkeutuu</th><th></th>
                </tr></thead>
                <tbody>
                    ${projects.sort((a,b) => b.weightedValue - a.weightedValue).map(p => `
                    <tr>
                        <td><strong>${p.name}</strong></td>
                        <td class="clickable" onclick="showCustomerModal(${p.customerId})">${p.customerName}</td>
                        <td>${p.blName}</td>

                        <td><span class="pill pill-${p.stageId}">${p.stageName} (${Math.round(p.probability * 100)}%)</span></td>

function renderPipelineStagesChart(filteredPipeline) {
    const stageData = pipelineStages.map(s => {
        const projects = filteredPipeline.filter(p => p.stageId === s.id);
        return {
            id: s.id,
            label: s.name,
            value: projects.reduce((sum, p) => sum + p.value, 0),
            count: projects.length,
            color: s.color,
        };
    }).filter(s => s.count > 0);

    const canvas = document.getElementById('chart-pipeline-stages');
    charts.pipelineStages = new Chart(canvas, {
        type: 'doughnut',
        data: {
            labels: stageData.map(s => `${s.label} (${s.count})`),
            datasets: [{
                data: stageData.map(s => s.value),
                backgroundColor: stageData.map(s => s.color),
                borderWidth: 2,
                borderColor: '#fff',
                hoverBorderWidth: 3,
                hoverOffset: 8,
            }],
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom', labels: { padding: 12, usePointStyle: true } },
                tooltip: {
                    callbacks: { label: ctx => ctx.label + ': ' + fmtK(ctx.parsed) + '  (klikkaa)' },
                },
            },
            onClick: (evt, elements) => {
                if (elements.length > 0) {
                    const idx = elements[0].index;
                    const stage = stageData[idx];
                    const projects = filteredPipeline.filter(p => p.stageId === stage.id);
                    renderPipelineDrilldown(stage.label, projects, stage.color);
                }
            },
        },
    });
}

        return {

            weighted: projects.reduce((sum, p) => sum + p.weightedValue, 0),

                x: { grid: { display: false } },
            },
            onClick: (evt, elements) => {
                if (elements.length > 0) {
                    const idx = elements[0].index;
                    const bl = blData[idx];
                    const projects = filteredPipeline.filter(p => p.bl === bl.id);
                    renderPipelineDrilldown(bl.label, projects, bl.color);
                }
            },
        },
    });
}

// ===== TARGETS VIEW =====
function renderTargets(el) {
    const quarterLabels = ['Q1', 'Q2', 'Q3', 'Q4'];
    const quarterActuals = [0, 0, 0, 0];

    // Calculate actuals by quarter
    for (const inv of invoices) {
        const q = Math.floor(inv.month / 3);
        quarterActuals[q] += inv.amount;
    }

    // Q1 actuals per BL
    const q1ByBL = {};
    for (const bl of businessLines) q1ByBL[bl.id] = 0;
    for (const inv of invoices) {
        if (inv.month < 3) q1ByBL[inv.bl] += inv.amount;
    }

    el.innerHTML = `
    <div class="animate-in">
        <div class="card">
            <div class="card-header">
                <h3>Vuositavoitteet 2026 – Business Lineittain</h3>
            </div>
            <div class="card-body">
                <div class="table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Business Line</th>
                            <th>Vetäjä</th>
                            <th class="text-right">Vuositavoite</th>
                            ${quarterLabels.map(q => `<th class="text-right">${q} Tavoite</th>`).join('')}
                            <th class="text-right">Q1 Toteuma</th>
                            <th class="text-right">Q1 Ero</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${businessLines.map(bl => {
                            const q1Actual = q1ByBL[bl.id];
                            const q1Target = bl.quarterTargets[0];
                            const q1Diff = q1Actual - q1Target;
                            return `
                            <tr>
                                <td><strong>${bl.name}</strong></td>
                                <td>${bl.leader}</td>
                                <td class="text-right font-mono fw-600">${fmtM(bl.targetAnnual)}</td>
                                ${bl.quarterTargets.map(qt => `<td class="text-right font-mono">${fmtM(qt)}</td>`).join('')}
                                <td class="text-right font-mono">${fmtM(q1Actual)}</td>
                                <td class="text-right font-mono" style="color:${q1Diff >= 0 ? 'var(--success)' : 'var(--danger)'}">${q1Diff >= 0 ? '+' : ''}${fmtK(q1Diff)}</td>
                            </tr>`;
                        }).join('')}
                        <tr style="font-weight:700;border-top:2px solid var(--border)">
                            <td>Yhteensä</td>
                            <td></td>
                            <td class="text-right font-mono">${fmtM(TOTAL_TARGET)}</td>
                            ${[0,1,2,3].map(q => `<td class="text-right font-mono">${fmtM(businessLines.reduce((s, bl) => s + bl.quarterTargets[q], 0))}</td>`).join('')}
                            <td class="text-right font-mono">${fmtM(Object.values(q1ByBL).reduce((s, v) => s + v, 0))}</td>
                            <td class="text-right font-mono" style="color:${Object.values(q1ByBL).reduce((s, v) => s + v, 0) - businessLines.reduce((s, bl) => s + bl.quarterTargets[0], 0) >= 0 ? 'var(--success)' : 'var(--danger)'}">${(Object.values(q1ByBL).reduce((s, v) => s + v, 0) - businessLines.reduce((s, bl) => s + bl.quarterTargets[0], 0)) >= 0 ? '+' : ''}${fmtK(Object.values(q1ByBL).reduce((s, v) => s + v, 0) - businessLines.reduce((s, bl) => s + bl.quarterTargets[0], 0))}</td>
                        </tr>
                    </tbody>
                </table>
                </div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header"><h3>Kvartaalitavoitteet vs. toteuma</h3></div>
                <div class="card-body"><canvas id="chart-quarter"></canvas></div>
            </div>
            <div class="card">
                <div class="card-header"><h3>Vuositavoitteen jakautuminen</h3></div>
                <div class="card-body"><canvas id="chart-target-split"></canvas></div>
            </div>
        </div>

        <!-- Run rate analysis -->
        <div class="card">
            <div class="card-header"><h3>Run Rate -analyysi (tavoitteen saavuttamiseksi)</h3></div>
            <div class="card-body">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Business Line</th>
                            <th class="text-right">YTD Toteuma</th>
                            <th class="text-right">Jäljellä oleva tavoite</th>
                            <th class="text-right">Nykyinen tahti/kk</th>
                            <th class="text-right">Vaadittava tahti/kk</th>
                            <th class="text-right">Erotus/kk</th>
                            <th class="text-center">Arvio</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${businessLines.map(bl => {
                            const rev = data.revenueByBL[bl.id];
                            const remaining = bl.targetAnnual - rev;
                            const currentRate = rev / MONTHS_ELAPSED;
                            const requiredRate = remaining / data.remainingMonths;
                            const rateDiff = requiredRate - currentRate;
                            const ratio = requiredRate / currentRate;
                            const assessment = ratio <= 1.0 ? 'Saavutettavissa' : ratio <= 1.15 ? 'Haastava' : 'Kriittinen';
                            const assessColor = ratio <= 1.0 ? 'var(--success)' : ratio <= 1.15 ? 'var(--warning)' : 'var(--danger)';
                            return `
                            <tr>
                                <td><strong>${bl.name}</strong></td>
                                <td class="text-right font-mono">${fmtM(rev)}</td>
                                <td class="text-right font-mono">${fmtM(remaining)}</td>
                                <td class="text-right font-mono">${fmtK(currentRate)}</td>
                                <td class="text-right font-mono">${fmtK(requiredRate)}</td>
                                <td class="text-right font-mono" style="color:${rateDiff <= 0 ? 'var(--success)' : 'var(--danger)'}">${rateDiff <= 0 ? '' : '+'}${fmtK(rateDiff)}</td>
                                <td class="text-center" style="color:${assessColor};font-weight:600">${assessment}</td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Organisation structure -->
        <div class="card">
            <div class="card-header"><h3>Organisaatiorakenne</h3></div>
            <div class="card-body">
                <div style="text-align:center;margin-bottom:24px">
                    <div style="display:inline-block;background:var(--sidebar-bg);color:#fff;padding:12px 24px;border-radius:8px;font-weight:600">
                        <i class="fas fa-crown"></i> Kari Toivonen – Toimitusjohtaja (CEO)
                    </div>
                    <div style="width:2px;height:24px;background:var(--border);margin:0 auto"></div>
                    <div style="display:inline-block;background:#334155;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px">
                        <i class="fas fa-chart-pie"></i> Maria Koistinen – Myyntijohtaja (CSO)
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:16px">
                    ${businessLines.map(bl => {
                        const managers = accountManagers.filter(am => am.bl === bl.id);
                        return `
                        <div style="border:2px solid ${bl.color};border-radius:8px;padding:16px">
                            <div style="font-weight:600;color:${bl.color};margin-bottom:4px">${bl.name}</div>
                            <div style="font-size:13px;margin-bottom:8px"><i class="fas fa-user-tie"></i> ${bl.leader}</div>
                            <div style="border-top:1px solid var(--border);padding-top:8px;font-size:12px;color:var(--text-light)">
                                ${managers.map(am => `<div style="margin-bottom:2px"><i class="fas fa-user"></i> ${am.name}</div>`).join('')}
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>
        </div>
    </div>`;

    // Quarter chart
    const q1Target = businessLines.reduce((s, bl) => s + bl.quarterTargets[0], 0);
    const q2Target = businessLines.reduce((s, bl) => s + bl.quarterTargets[1], 0);
    const q3Target = businessLines.reduce((s, bl) => s + bl.quarterTargets[2], 0);
    const q4Target = businessLines.reduce((s, bl) => s + bl.quarterTargets[3], 0);

    charts.quarter = new Chart(document.getElementById('chart-quarter'), {
        type: 'bar',
        data: {
            labels: ['Q1', 'Q2', 'Q3', 'Q4'],
            datasets: [
                {
                    label: 'Toteuma',
                    data: [quarterActuals[0], quarterActuals[1] || null, null, null],
                    backgroundColor: '#4f6ef7',
                    borderRadius: 4,
                    barPercentage: 0.5,
                },
                {
                    label: 'Tavoite',
                    data: [q1Target, q2Target, q3Target, q4Target],
                    backgroundColor: '#e2e8f0',
                    borderRadius: 4,
                    barPercentage: 0.5,
                },
            ],
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom', labels: { usePointStyle: true, padding: 12 } },
                tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + fmtM(ctx.parsed.y) } },
            },
            scales: {
                y: { beginAtZero: true, ticks: { callback: v => fmtM(v) }, grid: { color: '#f0f0f0' } },
                x: { grid: { display: false } },
            },
        },
    });

    // Target split chart
    charts.targetSplit = new Chart(document.getElementById('chart-target-split'), {
        type: 'doughnut',
        data: {
            labels: businessLines.map(bl => bl.name),
            datasets: [{
                data: businessLines.map(bl => bl.targetAnnual),
                backgroundColor: businessLines.map(bl => bl.color),
                borderWidth: 3,
                borderColor: '#fff',
            }],
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom', labels: { padding: 12, usePointStyle: true } },
                tooltip: { callbacks: { label: ctx => ctx.label + ': ' + fmtM(ctx.parsed) + ' (' + fmtPct(ctx.parsed / TOTAL_TARGET) + ')' } },
            },
        },
    });
}

// ===== INIT =====
renderView();

</script>
