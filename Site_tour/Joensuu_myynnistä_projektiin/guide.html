            box-shadow: 0 2px 8px rgba(0,0,0,0.06);

            gap: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;

            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;

        .section-body {
            padding: 0 1.5rem 1.25rem;
            font-size: 0.88rem;
            color: #475569;
        }

        .section-body p { margin-bottom: 0.75rem; }

        .section-body h4 {
            font-size: 0.88rem;
            font-weight: 600;
            color: #1e293b;
            margin: 1rem 0 0.35rem;

        .section-body ul {
            padding-left: 1.25rem;
            margin-bottom: 0.75rem;
        }

        .section-body li { margin-bottom: 0.25rem; }

        .section-body code {
            background: #f1f5f9;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.82rem;
            color: #334155;

            background: #1e293b;
            color: #e2e8f0;

            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.82rem;
            margin: 0.75rem 0;

            padding: 1rem;
            background: #f8fafc;
            border-radius: 8px;
            margin: 0.75rem 0;

            font-weight: 500;

</head>

let currentLang = 'fi';

function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.includes(lang.toUpperCase()));
    });
    document.querySelectorAll('[data-' + lang + ']').forEach(el => {
        el.textContent = el.getAttribute('data-' + lang);
    });
    render();
}

function render() {

    });
}
