<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Debug</title></head>
<body style="font-family:monospace;padding:20px;font-size:13px">
<h2>Debug: Analytiikka</h2>
<pre id="out" style="background:#f5f5f5;padding:16px;border-radius:8px;line-height:1.6"></pre>
<div style="display:flex;gap:20px;margin-top:20px">
  <div style="width:400px;height:300px;border:1px solid #ccc;border-radius:8px;padding:8px">
    <canvas id="testDonut"></canvas>
  </div>
  <div style="width:500px;height:300px;border:1px solid #ccc;border-radius:8px;padding:8px">
    <canvas id="testBar"></canvas>
  </div>
</div>

<script src="chart.min.js"></script>
<script src="data.js"></script>
<script>
var out = document.getElementById('out');
function log(msg) { out.textContent += msg + '\n'; }

try {
  log('1. Chart.js loaded: ' + (typeof Chart));
  log('2. PROJECTS: ' + PROJECTS.length);
  log('3. getMonday: ' + formatDate(getMonday(new Date())));

  // Build state like ensureHistory does
  var hours = {};
  var weekProjectsMap = {};
  var now = new Date();
  var yearStart = getMonday(new Date(now.getFullYear(), 0, 1));
  var currentMonday = getMonday(now);

  var mon = new Date(yearStart);
  var weekCount = 0;
  while (mon <= currentMonday) {
    var k = formatDate(mon);
    weekProjectsMap[k] = PROJECTS.map(function(p){return p.id;});
    var base = generatePreviousWeekHours();
    var rand = seededRand(mon.getTime() / 100000);
    var v = {};
    Object.entries(base).forEach(function(entry) {
      var pid = entry[0], days = entry[1];
      v[pid] = days.map(function(val, i) {
        if (i >= 5) return 0;
        var delta = (rand() - 0.5) * 2.5;
        return Math.max(0, Math.round((val + delta) * 4) / 4);
      });
    });
    hours[k] = v;
    mon = addDays(mon, 7);
    weekCount++;
  }
  log('4. Generated ' + weekCount + ' weeks of data');
  log('   Keys: ' + Object.keys(hours).join(', '));

  // Simulate getAnData for current month
  var yr = now.getFullYear(), mo = now.getMonth();
  var last = new Date(yr, mo + 1, 0);
  var testMon = getMonday(new Date(yr, mo, 1));
  var seen = {};
  var total = 0;
  var byProject = {};
  var byDay = [];

  while (testMon <= last) {
    var k2 = formatDate(testMon);
    if (!seen[k2]) {
      seen[k2] = true;
      var prj = weekProjectsMap[k2] || [];
      var wt = 0;
      prj.forEach(function(pid) {
        for (var d = 0; d < 7; d++) {
          var dd = addDays(testMon, d);
          if (dd.getMonth() !== mo) continue;
          var val = (hours[k2] && hours[k2][pid] && hours[k2][pid][d]) || 0;
          if (val) {
            if (!byProject[pid]) byProject[pid] = 0;
            byProject[pid] += val;
            total += val;
            wt += val;
          }
        }
      });
      byDay.push({ label: 'Vk ' + weekNumber(testMon), total: wt });
    }
    testMon = addDays(testMon, 7);
  }

  log('5. Month analysis:');
  log('   Total: ' + total.toFixed(1) + 'h');
  log('   Projects: ' + JSON.stringify(byProject));
  log('   Weeks: ' + byDay.map(function(d){return d.label+':'+d.total.toFixed(1)+'h';}).join(', '));

  // Draw charts
  if (typeof Chart !== 'undefined' && total > 0) {
    var pids = Object.keys(byProject);
    var colors = pids.map(function(pid){return PROJECTS.find(function(p){return p.id===pid;}).color;});
    var labels = pids.map(function(pid){return PROJECTS.find(function(p){return p.id===pid;}).name;});
    var vals = pids.map(function(pid){return Math.round(byProject[pid]*100)/100;});

    new Chart(document.getElementById('testDonut'), {
      type: 'doughnut',
      data: { labels: labels, datasets: [{ data: vals, backgroundColor: colors }] },
      options: { responsive: true, maintainAspectRatio: false }
    });

    new Chart(document.getElementById('testBar'), {
      type: 'bar',
      data: { labels: byDay.map(function(d){return d.label;}), datasets: [{ data: byDay.map(function(d){return d.total;}), backgroundColor: '#3b82f6' }] },
      options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
    });

    log('6. Charts rendered OK!');
  } else {
    log('6. FAILED: Chart=' + typeof Chart + ', total=' + total);
  }
} catch(e) {
  log('ERROR: ' + e.message + '\n' + e.stack);
}
</script>
</body></html>
