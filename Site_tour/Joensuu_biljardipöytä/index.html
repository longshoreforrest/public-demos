<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siili Pool - Joensuun biljardipöytä</title>
<style>
:root {
  --bg: #f5f7f5;
  --card: #fff;
  --hov: #f1f5f1;
  --brd: #d4e5d4;
  --tx: #1e2e1e;
  --dim: #5a7a5a;
  --mut: #8aaa8a;
  --pri: #1B5E20;
  --pri2: #2E7D32;
  --pri3: #4CAF50;
  --pri-light: #E8F5E9;
  --pri-glow: rgba(76,175,80,0.12);
  --accent: #FF6F00;
  --accent2: #FF8F00;
  --accent-light: #FFF3E0;
  --ok: #2E7D32;
  --warn: #F9A825;
  --err: #C62828;
  --purple: #6A1B9A;
  --purple-light: #F3E5F5;
  --gold: #FFD600;
  --silver: #B0BEC5;
  --bronze: #A1887F;
  --slack-bg: #1a1d21;
  --slack-side: #19171D;
  --slack-msg: #222529;
  --slack-tx: #D1D2D3;
  --slack-green: #2BAC76;
  --r: 8px;
  --r2: 12px;
  --sh: 0 1px 3px rgba(0,0,0,0.06);
  --sh2: 0 4px 12px rgba(0,0,0,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--tx); line-height: 1.5; }

/* ============ HEADER ============ */
header {
  background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #388E3C 100%);
  color: white;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: 0 2px 12px rgba(27,94,32,0.3);
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -10%;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
  border-radius: 50%;
}
.logo-icon {
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.header-text h1 { font-size: 1.3rem; font-weight: 700; }
.header-text .subtitle {
  font-size: 0.8rem;
  opacity: 0.8;
  font-weight: 400;
}

/* Language switcher */
.lang-switcher {
  display: flex;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 100px;
  overflow: hidden;
  margin-left: auto;
  margin-right: 12px;
}
.lang-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  font-size: 0.75rem;
  font-weight: 500;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  transition: all 0.2s;
}
.lang-btn.active { background: rgba(255,255,255,0.2); color: #fff; }
.lang-btn:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.1); }
.lang-flag { font-size: 0.85rem; line-height: 1; }

.guide-link {
  color: #A5D6A7;
  font-weight: 600;
  text-decoration: none;
  font-size: 0.82rem;
  white-space: nowrap;
  position: relative;
  z-index: 1;
}
.guide-link:hover { color: #fff; }

/* ============ TABS ============ */
.tabs {
  display: flex;
  background: #fff;
  border-bottom: 2px solid var(--brd);
  position: sticky;
  top: 0;
  z-index: 1000;
}
.tab {
  padding: 12px 24px;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 500;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  color: var(--dim);
  display: flex;
  align-items: center;
  gap: 6px;
}
.tab:hover { color: var(--tx); background: var(--hov); }
.tab.active { color: var(--pri); border-bottom-color: var(--pri3); }
.tab-icon { font-size: 1rem; }

.view { display: none; }
.view.active { display: block; }

/* ============ CALENDAR VIEW ============ */
.cal-container { max-width: 1100px; margin: 0 auto; padding: 16px 20px; }

.cal-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.cal-nav {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--brd);
  border-radius: var(--r);
  background: var(--card);
  cursor: pointer;
  color: var(--dim);
  font-size: 14px;
  transition: 0.15s;
}
.cal-nav:hover { background: var(--hov); color: var(--tx); }
.cal-week-label { font-size: 17px; font-weight: 700; }
.cal-week-label.current { color: var(--pri); }
.cal-date-range { font-size: 11px; color: var(--dim); }
.cal-actions { margin-left: auto; display: flex; gap: 8px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 8px 16px;
  border-radius: var(--r);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--brd);
  background: var(--card);
  color: var(--tx);
  transition: 0.15s;
  white-space: nowrap;
}
.btn:hover { background: var(--hov); }
.btn-pri { background: var(--pri); color: #fff; border-color: var(--pri); }
.btn-pri:hover { background: var(--pri2); }
.btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-accent:hover { background: var(--accent2); }
.btn-sm { padding: 6px 12px; font-size: 11px; }

/* Filters */
.cal-filters {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.cal-filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.cal-filter-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.filter-select {
  padding: 6px 10px;
  border: 1px solid var(--brd);
  border-radius: 6px;
  font-size: 12px;
  font-family: inherit;
  color: var(--tx);
  background: var(--card);
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
}
.filter-select:focus { border-color: var(--pri3); }
.filter-pill {
  padding: 4px 12px;
  border: 1px solid var(--brd);
  background: var(--card);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.15s;
  color: var(--dim);
}
.filter-pill:hover { border-color: var(--pri3); color: var(--pri); }
.filter-pill.active { background: var(--pri); color: #fff; border-color: var(--pri); }
.filter-clear {
  padding: 4px 10px;
  background: none;
  border: none;
  font-size: 11px;
  color: var(--dim);
  cursor: pointer;
  text-decoration: underline;
  transition: 0.15s;
}
.filter-clear:hover { color: var(--err); }

/* View mode toggle */
.cal-mode-toggle {
  display: flex;
  gap: 2px;
  background: var(--bg);
  border: 1px solid var(--brd);
  border-radius: var(--r);
  padding: 3px;
}
.cal-mode-btn {
  padding: 5px 14px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  color: var(--dim);
  border-radius: 6px;
  transition: 0.15s;
}
.cal-mode-btn:hover { color: var(--tx); background: rgba(0,0,0,0.03); }
.cal-mode-btn.active { background: var(--card); color: var(--tx); box-shadow: var(--sh); }

/* Month grid */
.cal-month-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  margin-bottom: 1px;
}
.cal-month-day-name {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  padding: 6px 0;
}
.cal-month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--brd);
  border: 1px solid var(--brd);
  border-radius: var(--r);
  overflow: hidden;
}
.cal-month-cell {
  background: var(--card);
  min-height: 80px;
  padding: 4px 6px;
  position: relative;
  cursor: pointer;
  transition: 0.15s;
}
.cal-month-cell:hover { background: var(--hov); }
.cal-month-cell.today { background: var(--pri-light); }
.cal-month-cell.other-month { background: #fafafa; opacity: 0.5; }
.cal-month-cell.weekend { background: #f9faf9; }
.cal-month-cell-day {
  font-size: 11px;
  font-weight: 700;
  color: var(--dim);
  margin-bottom: 2px;
}
.cal-month-cell.today .cal-month-cell-day { color: var(--pri); }
.cal-month-event {
  font-size: 9px;
  padding: 2px 4px;
  margin-bottom: 1px;
  border-radius: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}
.cal-month-event.upcoming { background: var(--pri-light); color: var(--pri); border-left: 2px solid var(--pri3); }
.cal-month-event.played { background: #f0f0f0; color: #888; border-left: 2px solid #ccc; }
.cal-month-more {
  font-size: 9px;
  color: var(--pri);
  font-weight: 600;
  padding: 1px 4px;
}

/* Day columns */
.cal-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
}
.cal-day {
  background: var(--card);
  border-radius: var(--r2);
  border: 1px solid var(--brd);
  box-shadow: var(--sh);
  overflow: hidden;
  min-height: 300px;
}
.cal-day.today { border-color: var(--pri3); box-shadow: 0 0 0 2px var(--pri-glow), var(--sh2); }
.cal-day-header {
  padding: 10px 12px;
  font-weight: 700;
  font-size: 13px;
  background: #f9faf9;
  border-bottom: 1px solid var(--brd);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.cal-day.today .cal-day-header { background: var(--pri-light); color: var(--pri); }
.cal-day-date { font-size: 10px; font-weight: 400; color: var(--dim); }
.cal-day.today .cal-day-date { color: var(--pri2); }

.cal-slots { padding: 6px; }
.cal-slot {
  padding: 8px 10px;
  margin-bottom: 4px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 3px solid transparent;
}
.cal-slot:hover { transform: translateX(2px); }
.cal-slot.upcoming {
  background: var(--pri-light);
  border-left-color: var(--pri3);
}
.cal-slot.played {
  background: #f5f5f5;
  border-left-color: var(--mut);
  opacity: 0.7;
}
.cal-slot-time { font-weight: 700; color: var(--pri); font-size: 12px; }
.cal-slot.played .cal-slot-time { color: var(--dim); }
.cal-slot-players { font-weight: 500; color: var(--tx); margin-top: 2px; }
.cal-slot-reason { font-size: 10px; color: var(--dim); margin-top: 1px; }
.cal-slot-status {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  padding: 1px 6px;
  border-radius: 10px;
  margin-top: 3px;
}
.cal-slot-status.played { background: #e0e0e0; color: #666; }
.cal-slot-status.upcoming { background: var(--pri-light); color: var(--pri); }

.cal-empty {
  padding: 20px;
  text-align: center;
  color: var(--mut);
  font-size: 12px;
}

.cal-add-btn {
  display: block;
  width: 100%;
  padding: 8px;
  border: 1px dashed var(--brd);
  background: transparent;
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
  color: var(--dim);
  transition: 0.15s;
  margin-top: 4px;
}
.cal-add-btn:hover { border-color: var(--pri3); color: var(--pri); background: var(--pri-light); }

/* ============ PLAYERS VIEW ============ */
.players-container { max-width: 1100px; margin: 0 auto; padding: 16px 20px; }

.players-tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 16px;
  background: var(--bg);
  border: 1px solid var(--brd);
  border-radius: var(--r);
  padding: 3px;
  width: fit-content;
}
.players-tab {
  padding: 6px 16px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  color: var(--dim);
  border-radius: 6px;
  transition: 0.15s;
}
.players-tab:hover { color: var(--tx); background: rgba(0,0,0,0.03); }
.players-tab.active { background: var(--card); color: var(--tx); box-shadow: var(--sh); }

/* Leaderboard */
.leaderboard {
  background: var(--card);
  border-radius: var(--r2);
  border: 1px solid var(--brd);
  box-shadow: var(--sh2);
  overflow: hidden;
}
.lb-header {
  display: grid;
  grid-template-columns: 50px 1fr 80px 70px 70px 80px;
  padding: 10px 16px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--dim);
  background: #f9faf9;
  border-bottom: 2px solid var(--brd);
}
.lb-row {
  display: grid;
  grid-template-columns: 50px 1fr 80px 70px 70px 80px;
  padding: 12px 16px;
  align-items: center;
  border-bottom: 1px solid var(--brd);
  transition: 0.15s;
  cursor: pointer;
}
.lb-row:hover { background: var(--hov); }
.lb-row:last-child { border-bottom: none; }
.lb-rank {
  font-size: 16px;
  font-weight: 800;
  text-align: center;
}
.lb-rank.gold { color: var(--gold); }
.lb-rank.silver { color: var(--silver); }
.lb-rank.bronze { color: var(--bronze); }
.lb-player { display: flex; align-items: center; gap: 10px; }
.lb-emoji { font-size: 20px; }
.lb-name { font-weight: 600; font-size: 13px; }
.lb-nick { font-size: 10px; color: var(--dim); }
.lb-skill { display: flex; gap: 2px; }
.lb-star { color: var(--gold); font-size: 12px; }
.lb-star.empty { color: #e0e0e0; }
.lb-wins { font-weight: 700; color: var(--ok); font-size: 13px; text-align: center; }
.lb-losses { font-weight: 600; color: var(--err); font-size: 13px; text-align: center; }
.lb-streak { font-weight: 700; font-size: 13px; text-align: center; }
.lb-streak.positive { color: var(--ok); }
.lb-streak.negative { color: var(--err); }

/* Player cards (grid view) */
.players-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.player-card {
  background: var(--card);
  border-radius: var(--r2);
  border: 1px solid var(--brd);
  box-shadow: var(--sh);
  padding: 16px;
  transition: 0.2s;
  cursor: pointer;
}
.player-card:hover { box-shadow: var(--sh2); transform: translateY(-2px); }
.pc-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.pc-emoji { font-size: 28px; }
.pc-name { font-weight: 700; font-size: 14px; }
.pc-nick { font-size: 11px; color: var(--dim); }
.pc-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 10px;
}
.pc-stat {
  text-align: center;
  padding: 6px;
  background: var(--bg);
  border-radius: 6px;
}
.pc-stat-val { font-size: 16px; font-weight: 800; }
.pc-stat-val.wins { color: var(--ok); }
.pc-stat-val.losses { color: var(--err); }
.pc-stat-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.3px; }
.pc-motto {
  font-size: 11px;
  color: var(--dim);
  font-style: italic;
  padding-top: 8px;
  border-top: 1px solid var(--brd);
}
.pc-skill { display: flex; gap: 2px; margin-top: 4px; }

/* ============ TOURNAMENTS VIEW ============ */
.tournaments-container { max-width: 1100px; margin: 0 auto; padding: 16px 20px; }

.tournament-section { margin-bottom: 24px; }
.tournament-section-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tournament-section-title .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.dot.active { background: var(--pri3); animation: pulse 2s infinite; }
.dot.upcoming { background: var(--warn); }
.dot.completed { background: var(--mut); }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.tournament-card {
  background: var(--card);
  border-radius: var(--r2);
  border: 1px solid var(--brd);
  box-shadow: var(--sh);
  margin-bottom: 16px;
  overflow: hidden;
}
.tc-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--brd);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.tc-title { font-size: 16px; font-weight: 700; }
.tc-dates { font-size: 11px; color: var(--dim); margin-top: 2px; }
.tc-badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.tc-badge.active { background: var(--pri-light); color: var(--pri); }
.tc-badge.upcoming { background: var(--accent-light); color: var(--accent); }
.tc-badge.completed { background: #f5f5f5; color: var(--dim); }

.tc-body { padding: 16px 20px; }
.tc-desc { font-size: 13px; color: var(--dim); margin-bottom: 10px; line-height: 1.5; }
.tc-prize {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: #FFF8E1;
  border: 1px solid #FFE082;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 12px;
}
.tc-participants {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.tc-participant {
  padding: 4px 10px;
  background: var(--bg);
  border: 1px solid var(--brd);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
}
.tc-participant.winner { background: #FFF8E1; border-color: var(--gold); color: #B8860B; font-weight: 700; }
.tc-participant.eliminated { opacity: 0.4; text-decoration: line-through; }

/* Bracket */
.bracket {
  display: flex;
  gap: 24px;
  padding: 16px 0;
  overflow-x: auto;
}
.bracket-round {
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-width: 200px;
}
.bracket-round-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--dim);
  text-align: center;
  margin-bottom: 4px;
}
.bracket-match {
  background: var(--bg);
  border: 1px solid var(--brd);
  border-radius: var(--r);
  overflow: hidden;
}
.bracket-player {
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 500;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--brd);
}
.bracket-player:last-child { border-bottom: none; }
.bracket-player.winner { background: var(--pri-light); font-weight: 700; color: var(--pri); }
.bracket-player.tbd { color: var(--mut); font-style: italic; }
.bracket-score { font-size: 11px; font-weight: 700; color: var(--dim); }
.bracket-player.winner .bracket-score { color: var(--pri); }

/* ============ SLACK VIEW ============ */
.slack-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 16px 20px;
}
.slack-window {
  background: var(--slack-bg);
  border-radius: var(--r2);
  box-shadow: var(--sh2);
  overflow: hidden;
  min-height: 500px;
  display: flex;
  flex-direction: column;
}
.slack-header {
  padding: 12px 20px;
  border-bottom: 1px solid #333;
  display: flex;
  align-items: center;
  gap: 10px;
}
.slack-channel-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--slack-tx);
}
.slack-channel-desc {
  font-size: 11px;
  color: #9a9b9e;
}
.slack-online {
  margin-left: auto;
  font-size: 11px;
  color: var(--slack-green);
  display: flex;
  align-items: center;
  gap: 4px;
}
.slack-online-dot {
  width: 8px;
  height: 8px;
  background: var(--slack-green);
  border-radius: 50%;
}

.slack-messages {
  flex: 1;
  padding: 16px 20px;
  overflow-y: auto;
  max-height: 450px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.slack-msg {
  display: flex;
  gap: 10px;
  padding: 6px 0;
  animation: msgIn 0.3s ease;
}

<script>
// i18n
(function(){
  window._lang = localStorage.getItem('siteTourLang') || 'fi';
  function applyLang(lang) {
    window._lang = lang;
    localStorage.setItem('siteTourLang', lang);
    document.documentElement.lang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    const dict = TRANSLATIONS[lang] || TRANSLATIONS.fi;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (dict[key]) el.textContent = dict[key];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.dataset.i18nPlaceholder;
      if (dict[key]) el.placeholder = dict[key];
    });
    // Re-render active view
    if (typeof renderCurrentView === 'function') renderCurrentView();
  }
  window._applyLang = applyLang;
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.lang-btn').forEach(b =>
      b.addEventListener('click', () => applyLang(b.dataset.lang))
    );
  });
})();
</script>
