<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siili Jyväskylä – Tapahtumat & Kalenteri</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="header-top">
    <div class="header-brand">
      <span class="header-logo">🏢</span>
      <div>
        <div class="header-title" data-i18n="appTitle">Siili Jyväskylä</div>
        <div class="header-subtitle" data-i18n="appSubtitle">Tapahtumat & Kalenteri</div>
      </div>
    </div>
    <div class="header-actions">
      <a class="btn-guide" href="guide.html" title="Käyttöohje / User Guide">?</a>
      <div class="lang-switcher" id="langSwitcher">
        <button class="lang-btn active" data-lang="fi" onclick="switchToLang('fi')"><span class="lang-flag">&#127467;&#127470;</span> FI</button>
        <button class="lang-btn" data-lang="en" onclick="switchToLang('en')"><span class="lang-flag">&#127468;&#127463;</span> EN</button>
      </div>
    </div>
  </div>
  <nav class="nav" id="main-nav">
    <button class="nav-tab active" data-view="calendar" data-i18n="tabCalendar">Kalenteri</button>
    <button class="nav-tab" data-view="map" data-i18n="tabMap">Kartta</button>
    <button class="nav-tab" data-view="events" data-i18n="tabEvents">Tapahtumat</button>
    <button class="nav-tab" data-view="analytics" data-i18n="tabAnalytics">Analytiikka</button>
  </nav>
</header>

<!-- ── Filters ── -->
<div class="filters" id="filter-bar"></div>

<!-- ── Main Content ── -->
<main>
  <!-- Calendar View -->
  <div id="calendar-view" class="view active">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)" aria-label="Previous month">&#9664;</button>
      <span class="cal-title" id="cal-title"></span>
      <button class="cal-nav-btn" onclick="changeMonth(1)" aria-label="Next month">&#9654;</button>
    </div>
    <div id="cal-header-row" class="cal-header-row"></div>
    <div id="cal-grid" class="cal-grid"></div>
  </div>

  <!-- Map View -->
  <div id="map-view" class="view">
    <div id="map-container"></div>
    <div class="map-legend" id="map-legend"></div>
  </div>

  <!-- Events List View -->
  <div id="events-view" class="view">
    <div class="events-toolbar">
      <span class="events-count" id="events-count"></span>
      <div class="export-btns">
        <button class="export-btn" onclick="exportICS()" data-i18n="downloadICS">Lataa .ics</button>
        <button class="export-btn" onclick="exportCSV()" data-i18n="downloadCSV">Lataa .csv</button>
      </div>
    </div>
    <div id="events-list"></div>
  </div>

  <!-- Analytics View -->
  <div id="analytics-view" class="view">
    <div class="analytics-grid" id="analytics-stats"></div>
    <div class="chart-grid">
      <div class="chart-card">
        <h3 data-i18n="byCategory"></h3>
        <div class="chart-container"><canvas id="chart-category"></canvas></div>
      </div>
      <div class="chart-card">
        <h3 data-i18n="byMonth"></h3>
        <div class="chart-container"><canvas id="chart-month"></canvas></div>
      </div>
      <div class="chart-card">
        <h3 data-i18n="byTraffic"></h3>
        <div class="chart-container"><canvas id="chart-traffic"></canvas></div>
      </div>
      <div class="chart-card">
        <h3 data-i18n="byVenue"></h3>
        <div class="chart-container"><canvas id="chart-venue"></canvas></div>
      </div>
    </div>
  </div>
</main>

<!-- ── Modal ── -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<!-- ── Scripts ── -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
