<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laskujen tarkastus – Siili Solutions Joensuu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --primary-light: #eff6ff;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-light: #8888a0;
            --border: #e2e8f0;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.12);
            --radius: 12px;
            --header-h: 58px;
            --success: #10b981;
            --success-light: #ecfdf5;
            --warning: #f59e0b;
            --warning-light: #fffbeb;
            --danger: #ef4444;
            --danger-light: #fef2f2;
            --info: #6366f1;
            --info-light: #eef2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d52 100%);
            color: #fff;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-logo {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-logo .dot { color: var(--primary); }

        .header-sep {
            width: 1px;
            height: 24px;
            background: rgba(255,255,255,0.2);
        }

        .header-title {
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0.9;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lang-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .lang-btn:hover, .lang-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .upload-btn {
            background: var(--primary);
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }

        .upload-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .nav-bar {
            position: sticky;
            top: var(--header-h);
            z-index: 90;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            overflow-x: auto;
            padding: 0 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }

        .nav-tab {
            padding: 12px 18px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-tab:hover {
            color: var(--primary);
            background: var(--primary-light);
        }

        .nav-tab.active {
            color: var(--primary);
            font-weight: 600;
            border-bottom-color: var(--primary);
        }

        .nav-badge {
            background: var(--primary-light);
            color: var(--primary);
            font-size: 0.68rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 100px;
        }

        .nav-tab.active .nav-badge {
            background: var(--primary);
            color: #fff;
        }

        .badge-warning {
            background: var(--warning-light) !important;
            color: var(--warning) !important;
        }

        .badge-danger {
            background: var(--danger-light) !important;
            color: var(--danger) !important;
        }

        .main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px 24px 40px;
        }

        .view { display: none; }
        .view.active { display: block; }

        /* Dashboard */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.25s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .stat-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .stat-sub {
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .stat-value.success { color: var(--success); }
        .stat-value.warning { color: var(--warning); }
        .stat-value.danger { color: var(--danger); }
        .stat-value.info { color: var(--info); }

        /* Section titles */
        .section-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Invoice list */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.82rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        .search-input:focus { border-color: var(--primary); }

        .filter-select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.82rem;
            font-family: inherit;
            outline: none;
            background: var(--card);
            cursor: pointer;
        }

        .filter-select:focus { border-color: var(--primary); }

        .invoice-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .invoice-table th {
            background: #f8fafc;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        .invoice-table td {
            padding: 12px 16px;
            font-size: 0.82rem;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        .invoice-table tr:last-child td { border-bottom: none; }

        .invoice-table tbody tr {
            cursor: pointer;
            transition: background 0.15s;
        }

        .invoice-table tbody tr:hover {
            background: var(--primary-light);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-ok { background: var(--success-light); color: var(--success); }
        .status-warning { background: var(--warning-light); color: var(--warning); }
        .status-danger { background: var(--danger-light); color: var(--danger); }
        .status-pending { background: #f1f5f9; color: var(--text-secondary); }

        .amount-cell {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            text-align: right;
        }

        .change-indicator {
            font-size: 0.68rem;
            font-weight: 600;
            margin-left: 4px;
        }

        .change-up { color: var(--danger); }
        .change-down { color: var(--success); }
        .change-same { color: var(--text-light); }

        /* Supplier view */
        .supplier-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .supplier-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .supplier-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .supplier-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .supplier-card:hover::before { opacity: 1; }

        .supplier-name {
            font-size: 0.92rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .supplier-category {
            font-size: 0.72rem;
            color: var(--text-light);
            margin-bottom: 12px;
        }

        .supplier-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
        }

        .supplier-stat {
            flex: 1;
        }

        .supplier-stat-label {
            font-size: 0.65rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .supplier-stat-value {
            font-size: 1rem;
            font-weight: 700;
        }

        .supplier-trend {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            padding: 6px 10px;
            background: #f8fafc;
            border-radius: 8px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(4px);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--card);
            border-radius: 16px;
            width: 100%;
            max-width: 680px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .modal-subtitle {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text-light);
            padding: 4px;
            line-height: 1;
            transition: color 0.15s;
        }

        .modal-close:hover { color: var(--text); }

        .modal-body { padding: 20px 24px; }

        .modal-section {
            margin-bottom: 20px;
        }

        .modal-section-title {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .detail-item {
            padding: 10px 14px;
            background: #f8fafc;
            border-radius: 8px;
        }

        .detail-label {
            font-size: 0.68rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .detail-value {
            font-size: 0.88rem;
            font-weight: 600;
            margin-top: 2px;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        .comparison-table th {
            text-align: left;
            font-weight: 600;
            padding: 8px 12px;
            background: #f8fafc;
            font-size: 0.72rem;
            color: var(--text-light);
            text-transform: uppercase;
        }

        .comparison-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #f1f5f9;
        }

        .highlight-row { background: var(--warning-light); }

        .alert-box {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.82rem;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
        }

        .alert-box.warning {
            background: var(--warning-light);
            color: #92400e;
            border: 1px solid #fde68a;
        }

        .alert-box.danger {
            background: var(--danger-light);
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-box.success {
            background: var(--success-light);
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .alert-box.info {
            background: var(--info-light);
            color: #3730a3;
            border: 1px solid #c7d2fe;
        }

        .alert-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
        }

        .btn:hover { background: #f1f5f9; }

        .btn-approve {
            background: var(--success);
            color: #fff;
            border-color: var(--success);
        }

        .btn-approve:hover { background: #059669; }

        .btn-reject {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        .btn-reject:hover { background: #dc2626; }

        .btn-review {
            background: var(--warning);
            color: #fff;
            border-color: var(--warning);
        }

        .btn-review:hover { background: #d97706; }

        /* Line items in modal */
        .line-items-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        .line-items-table th {
            text-align: left;
            font-weight: 600;
            padding: 8px 10px;
            background: #f8fafc;
            font-size: 0.7rem;
            color: var(--text-light);
            text-transform: uppercase;
        }

        .line-items-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #f1f5f9;
        }

        .line-items-table .amount { text-align: right; font-weight: 600; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a2e;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 500;
            z-index: 300;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Upload modal */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .upload-zone-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .upload-zone-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .upload-zone-sub {
            font-size: 0.72rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* Recent activity chart placeholder */
        .chart-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 160px;
            padding-top: 10px;
        }

        .bar-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            height: 100%;
            justify-content: flex-end;
        }

        .bar {
            width: 100%;
            max-width: 48px;
            border-radius: 6px 6px 0 0;
            transition: all 0.3s;
            min-height: 4px;
        }

        .bar:hover { opacity: 0.8; }

        .bar-label {
            font-size: 0.62rem;
            color: var(--text-light);
            font-weight: 600;
        }

        .bar-value {
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header { padding: 0 16px; }
            .main { padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .supplier-grid { grid-template-columns: 1fr; }
            .detail-grid { grid-template-columns: 1fr; }
            .filter-bar { flex-direction: column; }
            .search-input { min-width: auto; }
            .invoice-table { font-size: 0.75rem; }
            .invoice-table th, .invoice-table td { padding: 8px 10px; }
            .hide-mobile { display: none; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .header-title { display: none; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Hidden file input */
        #file-input { display: none; }

        /* ── Latest invoices action cards on dashboard ── */
        .latest-invoices-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 28px;
        }

        .action-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .action-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-1px);
        }

        .action-card-left {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .action-card-left.rec-approve { background: var(--success-light); }
        .action-card-left.rec-review { background: var(--warning-light); }
        .action-card-left.rec-reject { background: var(--danger-light); }

        .action-card-body {
            flex: 1;
            min-width: 0;
        }

        .action-card-title {
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-card-title .supplier-tag {
            font-size: 0.68rem;
            font-weight: 500;
            color: var(--text-secondary);
            background: #f1f5f9;
            padding: 1px 8px;
            border-radius: 100px;
        }

        .action-card-meta {
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-top: 2px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-card-flags {
            font-size: 0.7rem;
            color: var(--warning);
            margin-top: 4px;
        }

        .action-card-flags.danger { color: var(--danger); }

        .action-card-amount {
            font-size: 1.05rem;
            font-weight: 700;
            white-space: nowrap;
            margin-right: 4px;
        }

        .action-card-btns {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .action-card-btns .btn {
            padding: 5px 12px;
            font-size: 0.72rem;
            border-radius: 6px;
        }

        /* ── Analytics styles ── */
        .analytics-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            align-items: center;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
        }

        .analytics-filters label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .analytics-filters input[type="date"],
        .analytics-filters input[type="number"] {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.8rem;
            font-family: inherit;
            outline: none;
            width: 140px;
        }

        .analytics-filters input:focus { border-color: var(--primary); }

        .analytics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .analytics-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .analytics-panel.full-width {
            grid-column: 1 / -1;
        }

        .analytics-panel-title {
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .analytics-panel-title .panel-icon {
            font-size: 1rem;
        }

        /* Horizontal bar chart */
        .h-bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            padding: 4px 0;
            transition: opacity 0.15s;
        }

        .h-bar-row:hover { opacity: 0.8; }

        .h-bar-label {
            width: 150px;
            font-size: 0.78rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
        }

        .h-bar-track {
            flex: 1;
            height: 24px;
            background: #f1f5f9;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .h-bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.4s ease;
            display: flex;
            align-items: center;
            padding-left: 8px;
        }

        .h-bar-fill-text {
            font-size: 0.68rem;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
        }

        .h-bar-value {
            width: 100px;
            text-align: right;
            font-size: 0.78rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* Stacked monthly chart */
        .stacked-chart {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            height: 180px;
            padding-top: 10px;
        }

        .stacked-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            height: 100%;
            justify-content: flex-end;
        }

        .stacked-bar {
            width: 100%;
            max-width: 50px;
            display: flex;
            flex-direction: column;
        }

        .stacked-segment {
            width: 100%;
            min-height: 2px;
            transition: all 0.3s;
        }

        .stacked-segment:first-child { border-radius: 4px 4px 0 0; }
        .stacked-segment:last-child { border-radius: 0 0 4px 4px; }
        .stacked-segment:only-child { border-radius: 4px; }

        /* Drill-down table in analytics */
        .drill-section {
            margin-top: 20px;
            display: none;
        }

        .drill-section.visible { display: block; }

        .drill-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .drill-header .section-title { margin-bottom: 0; }

        .drill-close {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.72rem;
            cursor: pointer;
            color: var(--text-secondary);
            font-family: inherit;
            transition: all 0.15s;
        }

        .drill-close:hover { background: #f1f5f9; }

        /* Category color chips */
        .cat-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 3px;
            margin-right: 6px;
            vertical-align: middle;
        }

        /* Legend */
        .chart-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.68rem;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .analytics-grid { grid-template-columns: 1fr; }
            .action-card { flex-wrap: wrap; }
            .action-card-btns { width: 100%; justify-content: flex-end; }
            .h-bar-label { width: 100px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="header-logo">siili<span class="dot">.</span></div>
            <div class="header-sep"></div>
            <div class="header-title" data-i18n="headerTitle">Laskujen tarkastus – Joensuu</div>
        </div>
        <div class="header-right">
            <button class="upload-btn" id="uploadBtn" onclick="openUploadModal()">
                <span>&#x2B06;</span>
                <span data-i18n="uploadInvoice">Tuo lasku</span>
            </button>
            <a href="guide.html" style="color:#94a3b8;text-decoration:none;font-size:0.82rem;font-weight:600;margin-right:12px" data-i18n="guideLink">Käyttöohje &rarr;</a>
            <button class="lang-btn" id="langFi" onclick="applyLang('fi')">&#x1F1EB;&#x1F1EE; FI</button>
            <button class="lang-btn" id="langEn" onclick="applyLang('en')">&#x1F1EC;&#x1F1E7; EN</button>
        </div>
    </header>

    <nav class="nav-bar" id="navBar"></nav>

    <main class="main">
        <div class="view active" id="dashboard"></div>
        <div class="view" id="invoices"></div>
        <div class="view" id="analytics"></div>
        <div class="view" id="suppliers"></div>
        <div class="view" id="flagged"></div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <div class="modal-overlay" id="uploadOverlay">
        <div class="modal" style="max-width:500px">
            <div class="modal-header">
                <div>
                    <div class="modal-title" data-i18n="uploadTitle">Tuo uusi lasku</div>
                    <div class="modal-subtitle" data-i18n="uploadSubtitle">Valitse PDF-tiedosto tai pudota se alle</div>
                </div>
                <button class="modal-close" onclick="closeUploadModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="upload-zone" id="uploadZone" onclick="document.getElementById('file-input').click()">
                    <div class="upload-zone-icon">&#x1F4C4;</div>
                    <div class="upload-zone-text" data-i18n="uploadDropText">Pudota PDF-lasku tähän tai klikkaa valitaksesi</div>
                    <div class="upload-zone-sub" data-i18n="uploadFormat">Tuettu muoto: PDF</div>
                </div>
                <input type="file" id="file-input" accept=".pdf" onchange="handleFileUpload(event)">
                <div id="uploadResult"></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
